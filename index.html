<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <script>
        const SUPABASE_URL = "https://zlbwoxsmmdytoucgyhmc.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsYndveHNtbWR5dG91Y2d5aG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Nzk4MzUsImV4cCI6MjA5MTI1NTgzNX0.W1qBpzhCjOjVHRdeDCmfk6LjljlJc33AygVWG4CzWQE"; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: true, autoRefreshToken: true }
        });
    </script>

    <header class="sticky top-0 z-50 glass p-5 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-blue-600 uppercase italic">Biotrack</h1>
            <p id="header-date" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></p>
        </div>
        <button onclick="logout()" class="text-[10px] bg-slate-100 px-3 py-1 rounded-full font-bold text-slate-500 uppercase">Sortir</button>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white rounded-[2.5rem] p-8 shadow-2xl shadow-blue-900/10 mb-6 text-center border border-slate-50">
            <span id="kcal-left" class="text-7xl font-black tracking-tighter text-slate-800">2300</span>
            <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mt-2">Kcal restantes</p>
            
            <div class="grid grid-cols-3 gap-3 mt-8">
                <div class="bg-blue-50/50 p-3 rounded-2xl border border-blue-100">
                    <p class="text-[9px] font-black text-blue-500 mb-1 uppercase">Prot</p>
                    <p id="total-p" class="font-bold text-sm text-slate-700">0g</p>
                </div>
                <div class="bg-orange-50/50 p-3 rounded-2xl border border-orange-100">
                    <p class="text-[9px] font-black text-orange-500 mb-1 uppercase">Gluc</p>
                    <p id="total-g" class="font-bold text-sm text-slate-700">0g</p>
                </div>
                <div class="bg-pink-50/50 p-3 rounded-2xl border border-pink-100">
                    <p class="text-[9px] font-black text-pink-500 mb-1 uppercase">Lip</p>
                    <p id="total-l" class="font-bold text-sm text-slate-700">0g</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <button onclick="openModal('Petit-déjeuner')" class="bg-white p-4 rounded-2xl border border-slate-50 shadow-sm flex flex-col items-center">🥐<p class="text-[9px] font-black mt-2 uppercase">P.Déj</p></button>
            <button onclick="openModal('Déjeuner')" class="bg-white p-4 rounded-2xl border border-slate-50 shadow-sm flex flex-col items-center">🍽️<p class="text-[9px] font-black mt-2 uppercase">Déj</p></button>
            <button onclick="openModal('Dîner')" class="bg-white p-4 rounded-2xl border border-slate-50 shadow-sm flex flex-col items-center">🌃<p class="text-[9px] font-black mt-2 uppercase">Dîner</p></button>
            <button onclick="openModal('Boissons')" class="bg-white p-4 rounded-2xl border border-slate-50 shadow-sm flex flex-col items-center">🥤<p class="text-[9px] font-black mt-2 uppercase">Boisson</p></button>
            <button onclick="openModal('Autre')" class="bg-white p-4 rounded-2xl border border-slate-50 shadow-sm flex flex-col items-center">🍏<p class="text-[9px] font-black mt-2 uppercase">Autre</p></button>
            <button onclick="openModal('Sport')" class="bg-orange-500 p-4 rounded-2xl shadow-lg text-white flex flex-col items-center">🚲<p class="text-[9px] font-black mt-2 uppercase">Sport</p></button>
        </div>

        <div id="daily-list" class="space-y-4"></div>
    </main>

    <div id="modal-add" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-[60] backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-6 shadow-2xl overflow-y-auto max-h-[90vh]">
            <input id="in-desc" type="text" placeholder="Rechercher (ex: Spaghetti)..." class="w-full bg-slate-50 p-4 rounded-2xl mb-4 font-bold outline-none border border-slate-100" oninput="debounceSearch(this.value)">
            <div id="search-results" class="max-h-[200px] overflow-y-auto mb-4 hidden border border-slate-100 rounded-2xl bg-white"></div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <label class="text-[8px] font-black text-slate-400 uppercase">Quantité (g)</label>
                    <input id="in-qty" type="number" value="100" class="w-full bg-transparent font-bold text-blue-600 outline-none" oninput="recalc()">
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <label class="text-[8px] font-black text-slate-400 uppercase">Kcal/100g</label>
                    <input id="in-kcal" type="number" placeholder="0" class="w-full bg-transparent font-bold outline-none" oninput="recalc()">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-6">
                <div class="text-center bg-blue-50/30 p-2 rounded-xl">
                    <label class="text-[8px] font-black text-blue-400 uppercase">Prot/100g</label>
                    <input id="in-p" type="number" placeholder="0" class="w-full bg-transparent text-center font-bold outline-none text-xs" oninput="recalc()">
                </div>
                <div class="text-center bg-orange-50/30 p-2 rounded-xl">
                    <label class="text-[8px] font-black text-orange-400 uppercase">Gluc/100g</label>
                    <input id="in-g" type="number" placeholder="0" class="w-full bg-transparent text-center font-bold outline-none text-xs" oninput="recalc()">
                </div>
                <div class="text-center bg-pink-50/30 p-2 rounded-xl">
                    <label class="text-[8px] font-black text-pink-400 uppercase">Lip/100g</label>
                    <input id="in-l" type="number" placeholder="0" class="w-full bg-transparent text-center font-bold outline-none text-xs" oninput="recalc()">
                </div>
            </div>

            <div id="calc-res" class="text-3xl font-black text-center mb-6 text-slate-800 tracking-tighter">0 kcal</div>
            
            <button onclick="submitEntry()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black uppercase tracking-widest shadow-lg">VALIDER</button>
            <button onclick="closeModal()" class="w-full mt-4 text-[10px] text-slate-300 font-bold uppercase text-center">Fermer</button>
        </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 bg-blue-600 z-[100] hidden items-center justify-center p-8">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-3xl font-black text-blue-600 italic mb-8 uppercase tracking-tighter">BioTrack</h2>
            <input id="auth-email" type="email" placeholder="Email" class="w-full bg-slate-50 p-4 rounded-2xl mb-3 font-bold outline-none">
            <input id="auth-pass" type="password" placeholder="Mot de passe" class="w-full bg-slate-50 p-4 rounded-2xl mb-6 font-bold outline-none">
            <button onclick="handleAuth()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-xs">Se connecter</button>
        </div>
    </div>

    <script>
        let currentCat = ""; let searchTimer; let goal = 2300;

        async function init() {
            document.getElementById('header-date').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { document.getElementById('auth-screen').style.display = 'flex'; } 
            else { document.getElementById('auth-screen').style.display = 'none'; loadData(); }
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("Erreur : " + error.message); else init();
        }

        function logout() { supabaseClient.auth.signOut().then(() => location.reload()); }

        // RECHERCHE AMÉLIORÉE
        function debounceSearch(val) {
            const resDiv = document.getElementById('search-results');
            clearTimeout(searchTimer);

            if (val.length < 2) {
                resDiv.classList.add('hidden');
                return;
            }

            resDiv.classList.remove('hidden');
            resDiv.innerHTML = `<div class="p-4 text-[10px] font-bold text-slate-400 uppercase animate-pulse text-center">Recherche en cours...</div>`;

            searchTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://fr.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(val)}&json=1&page_size=8`);
                    const data = await res.json();
                    
                    if (!data.products || data.products.length === 0) {
                        resDiv.innerHTML = `<div class="p-4 text-[10px] font-bold text-red-400 uppercase text-center">Aucun résultat</div>`;
                        return;
                    }

                    resDiv.innerHTML = data.products
                        .filter(p => p.nutriments && p.nutriments['energy-kcal_100g'])
                        .map(p => {
                            const n = (p.product_name_fr || p.product_name || "Produit inconnu").replace(/'/g, "\\'");
                            const k = Math.round(p.nutriments['energy-kcal_100g']);
                            const pr = p.nutriments.proteins_100g || 0;
                            const gl = p.nutriments.carbohydrates_100g || 0;
                            const lp = p.nutriments.fat_100g || 0;
                            
                            return `<div onclick="fill('${n}', ${k}, ${pr}, ${gl}, ${lp})" class="p-4 border-b border-slate-50 cursor-pointer hover:bg-blue-50 bg-white active:bg-blue-100">
                                <p class="font-bold text-xs text-slate-800">${p.product_name_fr || p.product_name}</p>
                                <p class="text-[9px] text-blue-500 font-black mt-1 uppercase">${k} kcal / 100g</p>
                            </div>`;
                        }).join('');
                } catch (err) {
                    resDiv.innerHTML = `<div class="p-4 text-[10px] font-bold text-red-400 uppercase text-center">Erreur réseau</div>`;
                }
            }, 500);
        }

        function fill(n, k, pr, gl, lp) {
            document.getElementById('in-desc').value = n;
            document.getElementById('in-kcal').value = k;
            document.getElementById('in-p').value = pr;
            document.getElementById('in-g').value = gl;
            document.getElementById('in-l').value = lp;
            document.getElementById('search-results').classList.add('hidden');
            recalc();
        }

        function recalc() {
            const q = parseFloat(document.getElementById('in-qty').value) || 0;
            const k = parseFloat(document.getElementById('in-kcal').value) || 0;
            document.getElementById('calc-res').innerText = Math.round((k/100)*q) + " kcal";
        }

        async function submitEntry() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const q = parseFloat(document.getElementById('in-qty').value) || 0;
            const d = document.getElementById('in-desc').value;
            if(!d || !user) return;

            const { error } = await supabaseClient.from('entries').insert([{
                user_id: user.id,
                type: currentCat === 'Sport' ? 'burn' : 'food',
                category: currentCat,
                desc: `${d} (${q}g)`,
                val: Math.round((parseFloat(document.getElementById('in-kcal').value)/100)*q),
                prot: Math.round((parseFloat(document.getElementById('in-p').value)/100)*q),
                gluc: Math.round((parseFloat(document.getElementById('in-g').value)/100)*q),
                lip: Math.round((parseFloat(document.getElementById('in-l').value)/100)*q),
                date: new Date().toISOString().split('T')[0]
            }]);

            if (error) alert("Erreur Supabase : " + error.message);
            else { closeModal(); loadData(); }
        }

        async function loadData() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const today = new Date().toISOString().split('T')[0];
            const { data } = await supabaseClient.from('entries').select('*').eq('user_id', user.id).eq('date', today);

            let html = ""; let tIn = 0; let tOut = 0; let tp = 0; let tg = 0; let tl = 0;
            (data || []).forEach(e => {
                if(e.type === 'food') { tIn += e.val; tp += e.prot || 0; tg += e.gluc || 0; tl += e.lip || 0; }
                else { tOut += e.val; }
                
                html += `<div class="bg-white p-5 rounded-[1.5rem] flex justify-between items-center shadow-sm border border-slate-50">
                    <div>
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">${e.category}</span>
                        <p class="font-bold text-[11px] text-slate-700">${e.desc}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-sm ${e.type === 'food' ? 'text-blue-600' : 'text-orange-500'} tracking-tighter">${e.type === 'burn' ? '-' : ''}${e.val} kcal</span>
                        <button onclick="del(${e.id})" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>`;
            });
            document.getElementById('daily-list').innerHTML = html || `<div class="py-20 text-center opacity-20 font-black italic uppercase text-xs">Rien au compteur...</div>`;
            document.getElementById('kcal-left').innerText = (goal + tOut) - tIn;
            document.getElementById('total-p').innerText = Math.round(tp) + 'g';
            document.getElementById('total-g').innerText = Math.round(tg) + 'g';
            document.getElementById('total-l').innerText = Math.round(tl) + 'g';
        }

        async function del(id) {
            if (!confirm("Supprimer cet élément ?")) return;
            const { error } = await supabaseClient.from('entries').delete().eq('id', id);
            if (error) alert("Erreur lors de la suppression : " + error.message);
            else loadData();
        }

        function openModal(c) { 
            currentCat = c; 
            document.getElementById('in-desc').value = ""; 
            document.getElementById('in-kcal').value = "";
            document.getElementById('in-p').value = "";
            document.getElementById('in-g').value = "";
            document.getElementById('in-l').value = "";
            document.getElementById('calc-res').innerText = "0 kcal";
            document.getElementById('modal-add').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('modal-add').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
