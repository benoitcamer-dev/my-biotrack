<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioTrack Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode"></script>
<script src="https://cdn.tailwindcss.com"></script>

<meta name="theme-color" content="#2563eb">

<style>
body { background:#f8fafc; font-family:sans-serif; }
</style>
</head>

<body class="pb-24">

<script>
const SUPABASE_URL = "TON_URL";
const SUPABASE_KEY = "TA_CLE";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userWeight = 84;
let goal = 2300;
let currentCat = "";

// 🏃 sports
const sportsDB = [
    { name:"Marche lente (4 km/h)", met:2.8 },
    { name:"Marche normale (5 km/h)", met:3.5 },
    { name:"Marche rapide (6 km/h)", met:4.3 },
    { name:"Course (10 km/h)", met:10 },
    { name:"Vélo appart léger", met:4 },
    { name:"Vélo appart modéré", met:6 },
    { name:"Vélo appart intense", met:8 },
    { name:"Musculation", met:5 },
    { name:"Natation", met:8 }
];
</script>

<header class="p-4 bg-white shadow flex justify-between">
<div>
<h1 class="font-black text-blue-600">Biotrack</h1>
<p id="date"></p>
</div>
<button onclick="logout()">Sortir</button>
</header>

<main class="max-w-md mx-auto p-4">

<div class="bg-white p-4 rounded-xl text-center mb-4">
<div class="text-3xl font-black">
<span id="kcal-left">0</span> kcal
</div>

<div class="mt-2 text-xs">
objectif :
<input id="goal-input" type="number" value="2300" class="w-20 border text-center">
</div>

<div class="mt-2 text-xs">
poids :
<input id="weight-input" type="number" value="84" class="w-20 border text-center">
</div>
</div>

<div class="grid grid-cols-3 gap-2 mb-4">
<button onclick="openModal('Petit-déjeuner')">🥐</button>
<button onclick="openModal('Déjeuner')">🍽️</button>
<button onclick="openModal('Dîner')">🌙</button>
<button onclick="openModal('Boissons')">🥤</button>
<button onclick="openModal('Autre')">🍏</button>
<button onclick="openModal('Sport')">🚴</button>
</div>

<h2 class="font-bold mb-2">Historique rapide</h2>
<div id="history" class="flex gap-2 overflow-x-auto mb-4"></div>

<div id="daily-list"></div>

</main>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
<div class="bg-white p-4 rounded-xl w-full max-w-sm">

<input id="desc" placeholder="Rechercher..." class="w-full border p-2 mb-2">
<button onclick="startSearch()">🔍</button>
<button onclick="startScan()">📷</button>

<div id="results" class="max-h-40 overflow-y-auto"></div>

<input id="qty" type="number" value="100" class="w-full border mt-2">
<input id="kcal" type="number" placeholder="kcal ou MET" class="w-full border mt-2">

<div id="calc" class="text-center font-bold mt-2">0 kcal</div>

<button onclick="save()" class="w-full bg-blue-600 text-white p-2 mt-3">Valider</button>
<button onclick="closeModal()" class="w-full mt-2">Annuler</button>

<div id="reader" class="mt-3"></div>

</div>
</div>

<script>

function init(){
document.getElementById('date').innerText = new Date().toLocaleDateString();
load();
loadHistory();
}

// 🔎 FOOD SEARCH
async function searchFood(val){
const res = document.getElementById('results');

const urls = [
`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${val}&json=1&page_size=10`,
`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${val}&json=1&page_size=10&categories_tags=beverages`
];

const results = await Promise.all(urls.map(u=>fetch(u).then(r=>r.json())));
let products = [...results[0].products,...results[1].products];

res.innerHTML = products.slice(0,15).map(p=>{
let name = p.product_name_fr || p.product_name || "Inconnu";
let kcal = p.nutriments?.['energy-kcal_100g'] || 0;

if(kcal===0){
if(name.toLowerCase().includes("vin")) kcal=80;
if(name.toLowerCase().includes("biere")) kcal=45;
}

return `<div onclick="fill('${name}',${kcal})" class="p-2 border-b">${name}</div>`;
}).join('');
}

// 🏃 SPORT SEARCH
function searchSport(val){
const v = val.toLowerCase();

const res = sportsDB.filter(s =>
s.name.toLowerCase().includes(v) ||
v.includes("velo") || v.includes("vélo") ||
v.includes("marche")
);

document.getElementById('results').innerHTML =
res.map(s=>`<div onclick="fill('${s.name}',${s.met})" class="p-2 border-b">${s.name}</div>`).join('');
}

// 🚀 START SEARCH
function startSearch(){
const v = document.getElementById('desc').value;
if(currentCat==="Sport") searchSport(v);
else searchFood(v);
}

// 📷 SCAN
function startScan(){
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode: "environment" },
{ fps: 10 },
async (decodedText)=>{
html5QrCode.stop();

const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${decodedText}.json`);
const data = await res.json();

if(data.product){
let name = data.product.product_name || "Produit";
let kcal = data.product.nutriments?.['energy-kcal_100g'] || 0;
fill(name,kcal);
}
}
);
}

// ✏️ FILL
function fill(name,k){
document.getElementById('desc').value = name;
document.getElementById('kcal').value = k;
calc();
}

// 🔥 CALC
function calc(){
userWeight = parseFloat(document.getElementById('weight-input').value)||84;

let q = parseFloat(qty.value)||0;
let k = parseFloat(kcal.value)||0;

let total = currentCat==="Sport"
? k * userWeight * 0.0175 * q
: k * (q/100);

calc.innerText = Math.round(total)+" kcal";
}

qty.oninput = calc;
kcal.oninput = calc;

// 💾 SAVE
async function save(){
let q = parseFloat(qty.value)||0;
let k = parseFloat(kcal.value)||0;
let d = desc.value;

if(!d) return;

let val = currentCat==="Sport"
? k * userWeight * 0.0175 * q
: k * (q/100);

await supabaseClient.from('entries').insert([{
category:currentCat,
desc:d,
val:Math.round(val),
type:currentCat==="Sport"?"burn":"food",
date:new Date().toISOString().split('T')[0]
}]);

closeModal();
load();
loadHistory();
}

// 📊 LOAD
async function load(){
goal = parseInt(goal-input.value)||2300;

const today = new Date().toISOString().split('T')[0];

const { data } = await supabaseClient
.from('entries')
.select('*')
.eq('date',today);

let tIn=0,tOut=0;

const groups = {"Petit-déjeuner":[],"Déjeuner":[],"Dîner":[],"Boissons":[],"Autre":[]};

data.forEach(e=>{
if(e.type==="food") tIn+=e.val; else tOut+=e.val;
if(groups[e.category]) groups[e.category].push(e);
});

let html="";
for(const cat in groups){
if(!groups[cat].length) continue;
html+=`<h3 class="font-bold">${cat}</h3>`;
groups[cat].forEach(e=>{
html+=`<div class="flex justify-between bg-white p-2 mb-1">
<span>${e.desc}</span><span>${e.val}</span>
</div>`;
});
}

daily-list.innerHTML = html;
kcal-left.innerText = (goal+tOut)-tIn;
}

// ⚡ HISTORIQUE
async function loadHistory(){
const { data } = await supabaseClient
.from('entries')
.select('*')
.limit(10)
.order('id',{ascending:false});

history.innerHTML = data.map(e=>`
<button onclick="quickAdd('${e.desc}',${e.val})"
class="bg-white px-3 py-1 rounded shadow text-xs">
${e.desc}
</button>
`).join('');
}

function quickAdd(desc,val){
supabaseClient.from('entries').insert([{
category:"Autre",
desc,
val,
type:"food",
date:new Date().toISOString().split('T')[0]
}]).then(()=>load());
}

// UI
function openModal(cat){
currentCat=cat;
modal.classList.remove("hidden");
}

function closeModal(){
modal.classList.add("hidden");
desc.value="";
qty.value=100;
kcal.value="";
results.innerHTML="";
calc.innerText="0 kcal";
reader.innerHTML="";
}

// AUTH
function logout(){
supabaseClient.auth.signOut().then(()=>location.reload());
}

init();
</script>

</body>
</html>
