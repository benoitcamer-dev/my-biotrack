<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioTrack</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; margin:0; padding:20px; background:#0f172a; color:white; }
    input, button { padding:8px; margin:5px 0; }
    .card { background:#1e293b; padding:10px; margin:10px 0; border-radius:8px; }
    button { cursor:pointer; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>Connexion</h2>
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="mot de passe">
  <button onclick="login()">Se connecter</button>
  <p id="err" style="color:red;display:none;">Erreur login</p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <h1>BioTrack</h1>
  <button onclick="logout()">Logout</button>

  <h3>Objectif : <span id="goal"></span> kcal</h3>
  <h3>Restant : <span id="left"></span> kcal</h3>

  <hr>

  <h3>Ajouter aliment</h3>
  <input id="name" placeholder="Nom">
  <input id="kcal" type="number" placeholder="kcal">
  <button onclick="addEntry()">Ajouter</button>

  <h3>Entries</h3>
  <div id="list"></div>

</div>

<script>

/* ======================
   SUPABASE INIT
====================== */
const sb = supabase.createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

/* ======================
   STATE
====================== */
let userGoal = 2300;
let currentUser = null;
let entries = [];

/* ======================
   AUTH
====================== */
async function login() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;

  const { error } = await sb.auth.signInWithPassword({
    email,
    password: pass
  });

  if (error) {
    document.getElementById('err').style.display = "block";
  } else {
    init();
  }
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

/* ======================
   USER
====================== */
async function getUser() {
  if (currentUser) return currentUser;

  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  return user;
}

/* ======================
   INIT
====================== */
async function init() {
  const user = await getUser();
  if (!user) return;

  document.getElementById('auth').style.display = "none";
  document.getElementById('app').style.display = "block";

  await loadSettings();
  await loadEntries();
}

/* ======================
   SETTINGS
====================== */
async function loadSettings() {
  const user = await getUser();

  const { data } = await sb
    .from('user_settings')
    .select('*')
    .eq('user_id', user.id)
    .single();

  if (data) {
    userGoal = data.goal || 2300;
  }

  document.getElementById('goal').textContent = userGoal;
}

/* ======================
   ENTRIES
====================== */
function normalize(e) {
  return {
    ...e,
    desc: e.description
  };
}

async function loadEntries() {
  const user = await getUser();
  const today = new Date().toISOString().slice(0,10);

  const { data } = await sb
    .from('entries')
    .select('*')
    .eq('user_id', user.id)
    .eq('date', today);

  entries = (data || []).map(normalize);

  render();
}

async function addEntry() {
  const user = await getUser();

  const name = document.getElementById('name').value;
  const kcal = parseInt(document.getElementById('kcal').value);

  if (!name || !kcal) return;

  await sb.from('entries').insert([{
    user_id: user.id,
    type: "food",
    category: "Autre",
    description: name,
    val: kcal,
    date: new Date().toISOString().slice(0,10)
  }]);

  document.getElementById('name').value = "";
  document.getElementById('kcal').value = "";

  await loadEntries();
}

/* ======================
   DELETE
====================== */
async function del(id) {
  const user = await getUser();

  await sb
    .from('entries')
    .delete()
    .eq('id', id)
    .eq('user_id', user.id);

  await loadEntries();
}

/* ======================
   RENDER
====================== */
function render() {
  const el = document.getElementById('list');

  let total = 0;

  el.innerHTML = entries.map(e => {
    total += e.val;

    return `
      <div class="card">
        ${e.desc} - ${e.val} kcal
        <button onclick="del(${e.id})">X</button>
      </div>
    `;
  }).join('');

  document.getElementById('left').textContent = userGoal - total;
}

/* ======================
   START
====================== */
init();

</script>

</body>
</html>
