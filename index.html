<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BioTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* On garde ton style d'origine et on ajoute le style du scanner */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0f14; --surface: #161921; --surface2: #1e2330;
            --text: #f0f2f8; --muted: #7a8098; --accent: #5b7fff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding-bottom: 100px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* Scanner Viewport */
        #interactive.viewport { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; position: relative; }
        #interactive.viewport video, #interactive.viewport canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }

        /* Style des boutons et inputs (inspiré de ton code) */
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--surface); width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; }
        
        .fav-item { background: var(--surface2); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen" style="display:none; flex-direction: column; padding: 40px; justify-content: center; min-height: 100vh;">
    <h1 style="font-family: 'Syne'; margin-bottom: 20px;">BioTrack</h1>
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-pass" placeholder="Mot de passe" style="margin-top:10px;">
    <button class="btn btn-primary" onclick="handleAuth()">Connexion</button>
</div>

<div class="container" id="app" style="display:none;">
    <header style="padding: 20px 0;">
        <h2 id="header-date" style="font-family: 'Syne';">Journal</h2>
        <div id="kcal-display" style="font-size: 32px; font-weight: 800; margin-top:10px;">0 kcal</div>
    </header>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn btn-primary" onclick="openScanner()">📷 Scanner</button>
        <button class="btn btn-primary" style="background: var(--surface2)" onclick="openManual()">✍️ Manuel</button>
    </div>
    <button class="btn btn-primary" style="background: #7c5cfa" onclick="openFavs()">⭐ Mes Favoris Cloud</button>

    <div id="entries-list" style="margin-top: 30px;"></div>
</div>

<div id="modal-food" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-bottom:15px;">Aliment</h3>
        <div id="scanner-container" style="display:none;">
            <div id="interactive" class="viewport"></div>
        </div>
        
        <input type="text" id="f-desc" placeholder="Nom de l'aliment">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
            <input type="number" id="f-val" placeholder="Kcal/100g">
            <input type="number" id="f-prot" placeholder="Prot/100g">
            <input type="number" id="f-gluc" placeholder="Gluc/100g">
            <input type="number" id="f-lip" placeholder="Lip/100g">
        </div>
        <input type="number" id="f-qty" value="100" style="margin-top:10px;" placeholder="Quantité (g)">
        
        <div style="display: flex; gap: 10px; margin-top:20px;">
            <button class="btn btn-primary" onclick="saveEntry()">Valider</button>
            <button class="btn btn-primary" style="background: #ff7c4d; width: 60px;" onclick="saveAsFav()">⭐</button>
        </div>
        <button class="btn" style="background:transparent; color:var(--muted)" onclick="closeModal()">Fermer</button>
    </div>
</div>

<div id="modal-favs" class="modal">
    <div class="modal-content">
        <h3>Favoris</h3>
        <div id="favs-list" style="margin: 15px 0; max-height: 300px; overflow-y: auto;"></div>
        <button class="btn btn-primary" onclick="closeModal()">Fermer</button>
    </div>
</div>

<script>
    // --- CONFIGURATION (Remets tes vraies clés ici) ---
    const SB_URL = "TA_URL";
    const SB_KEY = "TA_CLE_ANON";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let user = null;

    // --- AUTHENTIFICATION (Comme ton code original) ---
    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pass').value;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else init();
    }

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            document.getElementById('auth-screen').style.display = 'flex';
        } else {
            user = session.user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadData();
        }
    }

    // --- JOURNAL ---
    async function loadData() {
        const today = new Date().toISOString().split('T')[0];
        const { data } = await sb.from('entries').select('*').eq('user_id', user.id).eq('date', today);
        
        const listEl = document.getElementById('entries-list');
        let total = 0;
        listEl.innerHTML = "";

        data?.forEach(e => {
            total += e.val;
            listEl.innerHTML += `
                <div style="background:var(--surface2); padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between;">
                    <span>${e.desc}</span>
                    <span style="font-weight:bold">${e.val} kcal</span>
                </div>`;
        });
        document.getElementById('kcal-display').textContent = total + " kcal";
    }

    async function saveEntry() {
        const factor = document.getElementById('f-qty').value / 100;
        const payload = {
            user_id: user.id,
            desc: document.getElementById('f-desc').value,
            val: Math.round(document.getElementById('f-kcal').value * factor),
            prot: document.getElementById('f-prot').value * factor,
            gluc: document.getElementById('f-gluc').value * factor,
            lip: document.getElementById('f-lip').value * factor,
            date: new Date().toISOString().split('T')[0]
        };
        await sb.from('entries').insert([payload]);
        closeModal();
        loadData();
    }

    // --- FAVORIS ---
    async function saveAsFav() {
        const payload = {
            user_id: user.id,
            name: document.getElementById('f-desc').value,
            kcal100: document.getElementById('f-kcal').value,
            prot100: document.getElementById('f-prot').value,
            gluc100: document.getElementById('f-gluc').value,
            lip100: document.getElementById('f-lip').value
        };
        await sb.from('favorites').insert([payload]);
        alert("Ajouté aux favoris !");
    }

    async function openFavs() {
        const { data } = await sb.from('favorites').select('*').eq('user_id', user.id);
        const list = document.getElementById('favs-list');
        list.innerHTML = "";
        data?.forEach(f => {
            const div = document.createElement('div');
            div.className = "fav-item";
            div.innerHTML = `<span>${f.name}</span><small>${f.kcal100} kcal</small>`;
            div.onclick = () => {
                document.getElementById('f-desc').value = f.name;
                document.getElementById('f-kcal').value = f.kcal100;
                document.getElementById('f-prot').value = f.prot100;
                document.getElementById('f-gluc').value = f.gluc100;
                document.getElementById('f-lip').value = f.lip100;
                document.getElementById('modal-favs').classList.remove('open');
                document.getElementById('modal-food').classList.add('open');
            };
            list.appendChild(div);
        });
        document.getElementById('modal-favs').classList.add('open');
    }

    // --- SCANNER ---
    function openScanner() {
        document.getElementById('scanner-container').style.display = 'block';
        document.getElementById('modal-food').classList.add('open');
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive') },
            decoder: { readers: ["ean_reader"] }
        }, (err) => { if(!err) Quagga.start(); });

        Quagga.onDetected(async (res) => {
            Quagga.stop();
            document.getElementById('scanner-container').style.display = 'none';
            const code = res.codeResult.code;
            const resp = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`).then(r => r.json());
            if(resp.status === 1) {
                const p = resp.product;
                document.getElementById('f-desc').value = p.product_name;
                document.getElementById('f-kcal').value = p.nutriments['energy-kcal_100g'] || 0;
                document.getElementById('f-prot').value = p.nutriments.proteins_100g || 0;
                document.getElementById('f-gluc').value = p.nutriments.carbohydrates_100g || 0;
                document.getElementById('f-lip').value = p.nutriments.fat_100g || 0;
            }
        });
    }

    function openManual() {
        document.getElementById('scanner-container').style.display = 'none';
        document.getElementById('modal-food').classList.add('open');
    }

    function closeModal() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
        if(Quagga) Quagga.stop();
    }

    init();
</script>
</body>
</html>
