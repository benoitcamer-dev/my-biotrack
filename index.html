<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioTrack Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { font-family: 'Inter', sans-serif; }
body { background: #0a0a0a; color: white; min-height: 100vh; }
.glass { 
  background: rgba(20,20,20,0.9); 
  backdrop-filter: blur(20px); 
  border: 1px solid rgba(255,255,255,0.1);
}
.card { 
  background: rgba(30,41,59,0.8);
  backdrop-filter: blur(12px);
  border-radius: 1rem;
  padding: 1rem;
  border: 1px solid rgba(71,85,105,0.5);
  cursor: pointer;
  transition: all 0.2s;
}
.card:hover { background: rgba(51,65,85,0.9); transform: scale(1.02); }
.card:active { transform: scale(0.95); }

.btn-primary { 
  background: linear-gradient(to right, #3b82f6, #9333ea);
  color: white; font-weight: 700;
  padding: 0.75rem 1.5rem;
  border-radius: 1rem;
  border: none; cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

.btn-secondary { 
  background: rgba(51,65,85,0.5);
  color: #e2e8f0; font-weight: 500;
  padding: 0.5rem 1rem;
  border-radius: 0.75rem;
  border: none; cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { background: rgba(71,85,105,0.8); }

/* FIX MODAL - le vrai correctif */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.active {
  opacity: 1;
  pointer-events: all;
}

@keyframes fadeInUp { 
  from { opacity: 0; transform: translateY(20px); } 
  to { opacity: 1; transform: translateY(0); } 
}
.fade-in-up { animation: fadeInUp 0.4s ease-out; }

/* Stat cards */
.stat-card {
  background: rgba(30,41,59,0.8);
  border-radius: 1.25rem;
  padding: 1rem;
  border: 1px solid rgba(71,85,105,0.4);
  text-align: center;
}

/* Section divider */
.section-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #94a3b8;
  margin-bottom: 0.75rem;
  padding-left: 0.25rem;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="sticky top-0 glass p-4 flex justify-between items-center z-40 shadow-2xl">
  <div class="flex items-center gap-3">
    <div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg">
      <span class="text-xl">📊</span>
    </div>
    <div>
      <h1 class="text-xl font-black bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">BioTrack</h1>
      <p id="date" class="text-xs text-slate-400 font-medium"></p>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button onclick="openSettings()" class="btn-secondary text-xs py-1.5 px-3">⚙️ Réglages</button>
    <button onclick="logout()" class="btn-secondary text-xs py-1.5 px-3">Déco.</button>
  </div>
</header>

<main class="max-w-sm mx-auto p-4 pb-24">

  <!-- === COMPTEURS CALORIES === -->
  <div class="glass rounded-2xl p-5 mb-5 fade-in-up">
    
    <!-- Kcal restantes (grande) -->
    <div class="text-center mb-4">
      <div class="text-5xl font-black bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent" id="kcalLeft">—</div>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest mt-1">kcal disponibles</p>
    </div>

    <!-- Barre de progression -->
    <div class="w-full bg-slate-700/50 rounded-full h-2.5 mb-4">
      <div id="progressBar" class="h-2.5 rounded-full bg-gradient-to-r from-emerald-500 to-teal-400 transition-all duration-500" style="width:0%"></div>
    </div>

    <!-- 3 stats -->
    <div class="grid grid-cols-3 gap-2 text-center">
      <div class="stat-card">
        <div class="text-lg font-black text-blue-400" id="statGoal">—</div>
        <div class="text-xs text-slate-500 mt-0.5">Objectif</div>
      </div>
      <div class="stat-card">
        <div class="text-lg font-black text-red-400" id="statIn">—</div>
        <div class="text-xs text-slate-500 mt-0.5">Ingérées</div>
      </div>
      <div class="stat-card">
        <div class="text-lg font-black text-emerald-400" id="statOut">—</div>
        <div class="text-xs text-slate-500 mt-0.5">Dépensées</div>
      </div>
    </div>

    <!-- Détail dépenses -->
    <div class="mt-3 flex justify-between text-xs text-slate-500 px-1">
      <span>🫀 Métabolisme de base : <span id="bmrDisplay" class="text-slate-400 font-semibold">—</span> kcal</span>
      <span>🚴 Sport : <span id="sportDisplay" class="text-slate-400 font-semibold">—</span> kcal</span>
    </div>
  </div>

  <!-- === HISTORIQUE RAPIDE === -->
  <div class="glass rounded-2xl p-4 mb-5 fade-in-up">
    <p class="section-label">⚡ Ajout rapide</p>
    <div id="history" class="flex gap-2 flex-wrap" style="min-height: 36px;"></div>
  </div>

  <!-- === REPAS === -->
  <div class="mb-5">
    <p class="section-label">🍽️ Repas du jour</p>
    <div class="grid grid-cols-3 gap-3 mb-3">
      <button onclick="openModal('Petit-déj')" class="card h-20 flex flex-col items-center justify-center gap-1.5">
        <span class="text-2xl">🥐</span>
        <span class="text-xs font-semibold text-slate-300">Petit-déj</span>
      </button>
      <button onclick="openModal('Déjeuner')" class="card h-20 flex flex-col items-center justify-center gap-1.5">
        <span class="text-2xl">🍽️</span>
        <span class="text-xs font-semibold text-slate-300">Déjeuner</span>
      </button>
      <button onclick="openModal('Dîner')" class="card h-20 flex flex-col items-center justify-center gap-1.5">
        <span class="text-2xl">🌙</span>
        <span class="text-xs font-semibold text-slate-300">Dîner</span>
      </button>
      <button onclick="openModal('Boissons')" class="card h-20 flex flex-col items-center justify-center gap-1.5">
        <span class="text-2xl">🥤</span>
        <span class="text-xs font-semibold text-slate-300">Boissons</span>
      </button>
      <button onclick="openModal('Snack')" class="card h-20 flex flex-col items-center justify-center gap-1.5">
        <span class="text-2xl">🍏</span>
        <span class="text-xs font-semibold text-slate-300">Snack</span>
      </button>
      <button onclick="openModal('Autre')" class="card h-20 flex flex-col items-center justify-center gap-1.5">
        <span class="text-2xl">➕</span>
        <span class="text-xs font-semibold text-slate-300">Autre</span>
      </button>
    </div>
  </div>

  <!-- === SPORT === -->
  <div class="mb-6">
    <p class="section-label">🏃 Activité physique</p>
    <button onclick="openModal('Sport')" class="w-full card flex items-center justify-between px-5 py-4"
      style="background: linear-gradient(135deg, rgba(249,115,22,0.25), rgba(239,68,68,0.2)); border-color: rgba(249,115,22,0.3);">
      <div class="flex items-center gap-3">
        <span class="text-3xl">🚴</span>
        <div class="text-left">
          <div class="font-bold text-white">Ajouter une activité</div>
          <div class="text-xs text-slate-400">Marche, vélo, natation, musculation…</div>
        </div>
      </div>
      <span class="text-orange-400 text-xl font-bold">→</span>
    </button>
  </div>

  <!-- === LISTE DU JOUR === -->
  <div>
    <p class="section-label">📋 Journal du jour</p>
    <div id="dailyList" class="space-y-2"></div>
  </div>

</main>

<!-- ============ MODAL ALIMENT / SPORT ============ -->
<div id="modal" class="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="glass rounded-3xl p-5 w-full max-w-md max-h-[88vh] flex flex-col fade-in-up" id="modalBox">
    
    <!-- Header modal -->
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
        <span id="modalEmoji" class="text-2xl"></span>
        <h3 id="modalTitle" class="text-xl font-bold text-white"></h3>
      </div>
      <button onclick="closeModal()" 
        style="width:32px;height:32px;border-radius:50%;background:rgba(71,85,105,0.5);border:none;color:#94a3b8;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        ×
      </button>
    </div>

    <!-- Recherche -->
    <div class="flex gap-2 mb-3">
      <input id="desc" 
        style="flex:1;padding:0.875rem;background:rgba(30,41,59,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.6);color:white;font-size:0.95rem;outline:none;"
        placeholder="Rechercher…"
        onkeydown="if(event.key==='Enter') startSearch()">
      <button onclick="startSearch()" 
        style="padding:0.875rem;background:rgba(51,65,85,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.5);color:white;cursor:pointer;font-size:1.1rem;transition:all 0.2s;"
        title="Rechercher">🔍</button>
    </div>

    <!-- Résultats (scrollable) -->
    <div id="results" 
      style="max-height:180px;overflow-y:auto;background:rgba(15,23,42,0.6);border-radius:0.875rem;margin-bottom:0.75rem;border:1px solid rgba(71,85,105,0.3);">
    </div>

    <!-- Quantité + kcal -->
    <div class="space-y-2">
      <div class="flex gap-2 items-center">
        <div class="flex-1">
          <label style="font-size:0.7rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;display:block;" id="qtyLabel">Quantité (g)</label>
          <input id="qty" value="100" 
            style="width:100%;padding:0.875rem;background:rgba(30,41,59,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.6);color:white;font-size:1.1rem;font-weight:700;text-align:center;outline:none;"
            oninput="calcModal()">
        </div>
        <div class="flex-1">
          <label style="font-size:0.7rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;display:block;" id="kcalLabel">kcal / 100g</label>
          <input id="kcal" 
            style="width:100%;padding:0.875rem;background:rgba(30,41,59,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.6);color:white;font-size:1.1rem;font-weight:700;text-align:center;outline:none;"
            placeholder="—"
            oninput="calcModal()">
        </div>
      </div>

      <!-- Total calculé -->
      <div id="calcDisplay" 
        style="text-align:center;padding:1rem;border-radius:1rem;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);">
        <span style="font-size:2rem;font-weight:900;background:linear-gradient(to right,#34d399,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
          0 kcal
        </span>
      </div>
    </div>

    <!-- Boutons -->
    <div style="display:flex;gap:0.75rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(71,85,105,0.3);">
      <button onclick="save()" class="btn-primary" style="flex:1;font-size:1rem;">✅ Valider</button>
      <button onclick="closeModal()" class="btn-secondary" style="flex:1;font-size:1rem;">❌ Annuler</button>
    </div>
  </div>
</div>

<!-- ============ MODAL RÉGLAGES ============ -->
<div id="settingsModal" class="modal-overlay" onclick="handleSettingsOverlayClick(event)">
  <div class="glass rounded-3xl p-5 w-full max-w-xs fade-in-up" id="settingsBox">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold">⚙️ Réglages</h3>
      <button onclick="closeSettings()" 
        style="width:32px;height:32px;border-radius:50%;background:rgba(71,85,105,0.5);border:none;color:#94a3b8;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">×</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="section-label">🎯 Objectif calorique (kcal)</label>
        <input id="goalInput" value="2300" 
          style="width:100%;padding:0.75rem;background:rgba(30,41,59,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.6);color:white;font-size:1.1rem;font-weight:700;text-align:center;outline:none;"
          oninput="saveSettings()">
      </div>
      <div>
        <label class="section-label">⚖️ Poids (kg)</label>
        <input id="weightInput" value="84" 
          style="width:100%;padding:0.75rem;background:rgba(30,41,59,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.6);color:white;font-size:1.1rem;font-weight:700;text-align:center;outline:none;"
          oninput="saveSettings()">
      </div>
      <div>
        <label class="section-label">📏 Âge</label>
        <input id="ageInput" value="30" 
          style="width:100%;padding:0.75rem;background:rgba(30,41,59,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.6);color:white;font-size:1.1rem;font-weight:700;text-align:center;outline:none;"
          oninput="saveSettings()">
      </div>
      <div>
        <label class="section-label">📐 Taille (cm)</label>
        <input id="heightInput" value="175" 
          style="width:100%;padding:0.75rem;background:rgba(30,41,59,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.6);color:white;font-size:1.1rem;font-weight:700;text-align:center;outline:none;"
          oninput="saveSettings()">
      </div>
      <div>
        <label class="section-label">🚻 Sexe</label>
        <select id="sexeInput"
          style="width:100%;padding:0.75rem;background:rgba(30,41,59,0.8);border-radius:0.875rem;border:1px solid rgba(71,85,105,0.6);color:white;font-size:1rem;outline:none;"
          onchange="saveSettings()">
          <option value="H">Homme</option>
          <option value="F">Femme</option>
        </select>
      </div>
    </div>
    <div style="margin-top:0.75rem;padding:0.75rem;background:rgba(59,130,246,0.1);border-radius:0.75rem;border:1px solid rgba(59,130,246,0.2);">
      <p class="text-xs text-slate-400">Métabolisme de base calculé : <span id="bmrCalc" class="font-bold text-blue-400">—</span> kcal/j</p>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG SUPABASE
// ============================================================
const SUPABASE_URL = "TON_URL";
const SUPABASE_KEY = "TA_CLE";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let currentCat = "";
let userWeight = 84;
let userAge = 30;
let userHeight = 175;
let userSexe = "H";
let userGoal = 2300;

const sportsDB = [
  { name:"Marche lente (4 km/h)", met:2.8 },
  { name:"Marche normale (5 km/h)", met:3.5 },
  { name:"Marche rapide (6 km/h)", met:4.3 },
  { name:"Course légère (8 km/h)", met:8 },
  { name:"Course (10 km/h)", met:10 },
  { name:"Course rapide (12 km/h)", met:12.5 },
  { name:"Vélo léger", met:4 },
  { name:"Vélo modéré", met:6 },
  { name:"Vélo intense", met:8 },
  { name:"Musculation légère", met:3.5 },
  { name:"Musculation intense", met:6 },
  { name:"Natation", met:8 },
  { name:"Yoga", met:2.5 },
  { name:"Escaliers", met:4 },
  { name:"Danse", met:5 }
];

// ============================================================
// INIT
// ============================================================
async function init() {
  // Date
  document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR', { 
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
  });
  
  // Charger prefs
  loadSettings();
  
  // Charger données
  await load();
  await loadHistory();
}

// ============================================================
// SETTINGS
// ============================================================
function loadSettings() {
  userWeight = parseFloat(localStorage.getItem('weight') || '84');
  userAge    = parseInt(localStorage.getItem('age') || '30');
  userHeight = parseInt(localStorage.getItem('height') || '175');
  userSexe   = localStorage.getItem('sexe') || 'H';
  userGoal   = parseInt(localStorage.getItem('goal') || '2300');

  document.getElementById('weightInput').value  = userWeight;
  document.getElementById('ageInput').value     = userAge;
  document.getElementById('heightInput').value  = userHeight;
  document.getElementById('goalInput').value    = userGoal;
  document.getElementById('sexeInput').value    = userSexe;
  
  updateBMRDisplay();
}

function saveSettings() {
  userWeight = parseFloat(document.getElementById('weightInput').value) || 84;
  userAge    = parseInt(document.getElementById('ageInput').value) || 30;
  userHeight = parseInt(document.getElementById('heightInput').value) || 175;
  userSexe   = document.getElementById('sexeInput').value;
  userGoal   = parseInt(document.getElementById('goalInput').value) || 2300;

  localStorage.setItem('weight', userWeight);
  localStorage.setItem('age', userAge);
  localStorage.setItem('height', userHeight);
  localStorage.setItem('sexe', userSexe);
  localStorage.setItem('goal', userGoal);

  updateBMRDisplay();
  load();
}

function calcBMR() {
  // Formule Mifflin-St Jeor
  if (userSexe === 'H') {
    return Math.round(10 * userWeight + 6.25 * userHeight - 5 * userAge + 5);
  } else {
    return Math.round(10 * userWeight + 6.25 * userHeight - 5 * userAge - 161);
  }
}

function updateBMRDisplay() {
  const bmr = calcBMR();
  const el = document.getElementById('bmrCalc');
  if (el) el.textContent = bmr;
}

function openSettings() {
  document.getElementById('settingsModal').classList.add('active');
  updateBMRDisplay();
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('active');
}
function handleSettingsOverlayClick(e) {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
}

// ============================================================
// MODAL PRINCIPAL
// ============================================================
function openModal(cat) {
  currentCat = cat;
  
  const emojis = {
    'Petit-déj':'🥐','Déjeuner':'🍽️','Dîner':'🌙',
    'Boissons':'🥤','Snack':'🍏','Autre':'➕','Sport':'🚴'
  };
  
  document.getElementById('modalEmoji').textContent = emojis[cat] || '📝';
  document.getElementById('modalTitle').textContent = cat;
  
  // Adapter les labels selon le contexte
  if (cat === 'Sport') {
    document.getElementById('qtyLabel').textContent = 'Durée (min)';
    document.getElementById('kcalLabel').textContent = 'MET';
    document.getElementById('qty').value = '30';
    document.getElementById('desc').placeholder = 'Ex: Course, Vélo…';
    // Afficher tous les sports par défaut
    showAllSports();
  } else {
    document.getElementById('qtyLabel').textContent = 'Quantité (g/ml)';
    document.getElementById('kcalLabel').textContent = 'kcal / 100g';
    document.getElementById('qty').value = '100';
    document.getElementById('desc').placeholder = 'Rechercher un aliment…';
    document.getElementById('results').innerHTML = '';
  }
  
  document.getElementById('kcal').value = '';
  document.getElementById('calcDisplay').innerHTML = `
    <span style="font-size:2rem;font-weight:900;background:linear-gradient(to right,#34d399,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">0 kcal</span>`;
  
  // Ouvrir la modale
  document.getElementById('modal').classList.add('active');
  
  // Focus après transition
  setTimeout(() => document.getElementById('desc').focus(), 150);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.getElementById('desc').value = '';
  document.getElementById('results').innerHTML = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function showAllSports() {
  document.getElementById('results').innerHTML = sportsDB.map(s => 
    `<div onclick="fill('${s.name.replace(/'/g,"\\'")}', ${s.met})" 
      style="padding:0.625rem 0.875rem;border-radius:0.625rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s;"
      onmouseover="this.style.background='rgba(51,65,85,0.7)'" 
      onmouseout="this.style.background='transparent'">
      <span style="font-size:0.875rem;">${s.name}</span>
      <span style="font-weight:700;font-size:0.8rem;color:#fb923c;">${s.met} MET</span>
    </div>`
  ).join('');
}

// ============================================================
// SEARCH
// ============================================================
function startSearch() {
  const query = document.getElementById('desc').value.trim();
  if (!query) {
    if (currentCat === 'Sport') showAllSports();
    return;
  }
  if (currentCat === "Sport") searchSport(query);
  else searchFood(query);
}

async function searchFood(query) {
  document.getElementById('results').innerHTML = '<div style="padding:1rem;text-align:center;color:#94a3b8;font-size:0.85rem;">⏳ Recherche…</div>';
  
  try {
    const res = await fetch(
      `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&page_size=12`
    );
    const data = await res.json();
    const products = (data?.products || []).filter(p => p.product_name_fr || p.product_name).slice(0, 12);

    if (!products.length) {
      document.getElementById('results').innerHTML = '<div style="padding:1rem;text-align:center;color:#64748b;">Aucun résultat</div>';
      return;
    }

    document.getElementById('results').innerHTML = products.map(p => {
      const name = p.product_name_fr || p.product_name || "Inconnu";
      const kcal = Math.round(p.nutriments?.['energy-kcal_100g'] || 0);
      const color = kcal > 400 ? '#f87171' : kcal > 200 ? '#fbbf24' : '#34d399';
      return `<div onclick="fill('${name.replace(/['"]/g,"_")}', ${kcal})" 
        style="padding:0.625rem 0.875rem;border-radius:0.625rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s;"
        onmouseover="this.style.background='rgba(51,65,85,0.7)'" 
        onmouseout="this.style.background='transparent'">
        <span style="font-size:0.85rem;flex:1;margin-right:0.5rem;">${name.length>40?name.slice(0,40)+'…':name}</span>
        <span style="font-weight:700;font-size:0.8rem;color:${color};white-space:nowrap;">${kcal || '?'} kcal</span>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('results').innerHTML = '<div style="padding:1rem;text-align:center;color:#ef4444;">❌ Erreur réseau</div>';
  }
}

function searchSport(query) {
  const q = query.toLowerCase();
  const results = sportsDB.filter(s => s.name.toLowerCase().includes(q));
  
  if (!results.length) {
    document.getElementById('results').innerHTML = '<div style="padding:1rem;text-align:center;color:#64748b;">Sport non trouvé</div>';
    return;
  }
  
  document.getElementById('results').innerHTML = results.map(s => 
    `<div onclick="fill('${s.name.replace(/'/g,"\\'")}', ${s.met})" 
      style="padding:0.625rem 0.875rem;border-radius:0.625rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s;"
      onmouseover="this.style.background='rgba(51,65,85,0.7)'" 
      onmouseout="this.style.background='transparent'">
      <span style="font-size:0.875rem;">${s.name}</span>
      <span style="font-weight:700;font-size:0.8rem;color:#fb923c;">${s.met} MET</span>
    </div>`
  ).join('');
}

// ============================================================
// FILL + CALC
// ============================================================
function fill(name, kcalValue) {
  document.getElementById('desc').value = name;
  document.getElementById('kcal').value = kcalValue;
  calcModal();
  // Scroll vers le bas du modal
  document.getElementById('qty').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function calcModal() {
  const qty     = parseFloat(document.getElementById('qty').value) || 0;
  const kcalVal = parseFloat(document.getElementById('kcal').value) || 0;
  
  let total = 0;
  if (currentCat === "Sport") {
    // MET × poids(kg) × 0.0175 × durée(min)
    total = Math.round(kcalVal * userWeight * 0.0175 * qty);
  } else {
    total = Math.round(kcalVal * qty / 100);
  }
  
  const color = currentCat === "Sport" 
    ? 'linear-gradient(to right,#34d399,#2dd4bf)'
    : total > 500 ? 'linear-gradient(to right,#f87171,#fb923c)'
    : total > 200 ? 'linear-gradient(to right,#fbbf24,#f97316)'
    : 'linear-gradient(to right,#34d399,#2dd4bf)';
  
  document.getElementById('calcDisplay').innerHTML = `
    <span style="font-size:2rem;font-weight:900;background:${color};-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
      ${total} kcal
    </span>`;
}

// ============================================================
// SAVE
// ============================================================
async function save() {
  const qty     = parseFloat(document.getElementById('qty').value) || 0;
  const kcalVal = parseFloat(document.getElementById('kcal').value) || 0;
  const descVal = document.getElementById('desc').value.trim();
  
  if (!descVal) { alert('Renseigne un aliment ou une activité !'); return; }
  if (qty <= 0)  { alert('Indique une quantité ou une durée !'); return; }
  
  const isSport = currentCat === "Sport";
  const val = isSport
    ? Math.round(kcalVal * userWeight * 0.0175 * qty)
    : Math.round(kcalVal * qty / 100);
  
  if (val <= 0) { alert('Calcule d\'abord les calories (vérifie MET et durée)'); return; }

  const btn = document.querySelector('#modal .btn-primary');
  btn.textContent = '⏳ Sauvegarde…';
  btn.disabled = true;

  const { error } = await supabaseClient.from('entries').insert([{
    category: currentCat,
    desc:     descVal,
    val:      val,
    type:     isSport ? "burn" : "food",
    date:     new Date().toISOString().split('T')[0]
  }]);
  
  btn.textContent = '✅ Valider';
  btn.disabled = false;

  if (!error) {
    closeModal();
    await load();
    await loadHistory();
  } else {
    console.error(error);
    alert('Erreur de sauvegarde : ' + error.message);
  }
}

// ============================================================
// LOAD DONNÉES DU JOUR
// ============================================================
async function load() {
  const today = new Date().toISOString().split('T')[0];
  const { data = [], error } = await supabaseClient
    .from('entries').select('*').eq('date', today).order('id', { ascending: true });
  
  if (error) console.error('Load error:', error);
  
  const bmr = calcBMR();
  let totalIn  = 0;
  let totalSport = 0;
  
  // Groups pour l'affichage
  const groups = {
    "Petit-déj": [], "Déjeuner": [], "Dîner": [],
    "Boissons": [], "Snack": [], "Autre": [], "Sport": []
  };
  
  (data || []).forEach(e => {
    if (e.type === "food")  totalIn    += e.val;
    if (e.type === "burn")  totalSport += e.val;
    if (groups[e.category] !== undefined) groups[e.category].push(e);
  });
  
  const totalOut  = bmr + totalSport;
  const remaining = userGoal + totalSport - totalIn; // objectif + dépenses sport - ingéré
  const progress  = Math.min(100, Math.round((totalIn / userGoal) * 100));

  // Mise à jour des compteurs
  document.getElementById('kcalLeft').textContent  = Math.max(0, remaining);
  document.getElementById('statGoal').textContent  = userGoal;
  document.getElementById('statIn').textContent    = totalIn;
  document.getElementById('statOut').textContent   = totalOut;
  document.getElementById('bmrDisplay').textContent = bmr;
  document.getElementById('sportDisplay').textContent = totalSport;
  document.getElementById('progressBar').style.width = progress + '%';
  
  // Couleur de la barre selon niveau
  const bar = document.getElementById('progressBar');
  if (progress > 90)      bar.style.background = 'linear-gradient(to right,#ef4444,#f97316)';
  else if (progress > 70) bar.style.background = 'linear-gradient(to right,#fbbf24,#f97316)';
  else                    bar.style.background = 'linear-gradient(to right,#10b981,#14b8a6)';

  // Couleur kcal restantes
  const kcalEl = document.getElementById('kcalLeft');
  if (remaining < 200)      kcalEl.style.background = 'linear-gradient(to right,#ef4444,#f87171)';
  else if (remaining < 500) kcalEl.style.background = 'linear-gradient(to right,#fbbf24,#f97316)';
  else                      kcalEl.style.background = 'linear-gradient(to right,#34d399,#2dd4bf)';
  kcalEl.style.webkitBackgroundClip = 'text';
  kcalEl.style.webkitTextFillColor  = 'transparent';

  // Liste du jour
  const emojis = {
    'Petit-déj':'🥐','Déjeuner':'🍽️','Dîner':'🌙',
    'Boissons':'🥤','Snack':'🍏','Autre':'➕','Sport':'🚴'
  };
  
  let html = '';
  for (const [cat, items] of Object.entries(groups)) {
    if (!items.length) continue;
    const subtotal = items.reduce((s, e) => s + e.val, 0);
    
    html += `
      <div style="margin-bottom:0.5rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.375rem;padding:0 0.25rem;">
          <span style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;">
            ${emojis[cat] || '📝'} ${cat}
          </span>
          <span style="font-size:0.75rem;font-weight:700;color:${cat==='Sport'?'#34d399':'#f87171'};">
            ${subtotal} kcal
          </span>
        </div>`;
    
    items.forEach(e => {
      html += `
        <div onclick="deleteEntry(${e.id})" 
          style="background:rgba(30,41,59,0.7);border-radius:0.875rem;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:0.375rem;border:1px solid rgba(71,85,105,0.3);cursor:pointer;transition:all 0.2s;"
          onmouseover="this.style.background='rgba(51,65,85,0.8)';this.style.borderColor='rgba(239,68,68,0.3)'"
          onmouseout="this.style.background='rgba(30,41,59,0.7)';this.style.borderColor='rgba(71,85,105,0.3)'">
          <span style="font-size:0.875rem;font-weight:500;">${e.desc}</span>
          <div style="text-align:right;flex-shrink:0;margin-left:0.5rem;">
            <span style="font-size:1rem;font-weight:800;color:${e.type==='burn'?'#34d399':'#f87171'}">${e.val}</span>
            <span style="font-size:0.65rem;color:#64748b;margin-left:2px;">${e.type==='burn'?'brûlé':'kcal'}</span>
          </div>
        </div>`;
    });
    
    html += `</div>`;
  }
  
  document.getElementById('dailyList').innerHTML = html || `
    <div style="text-align:center;color:#475569;padding:2rem 1rem;">
      <div style="font-size:2.5rem;margin-bottom:0.5rem;">🍽️</div>
      <div style="font-size:0.95rem;font-weight:500;">Aucune entrée aujourd'hui</div>
      <div style="font-size:0.8rem;margin-top:0.25rem;color:#334155;">Clique sur un repas ou Sport pour commencer !</div>
    </div>`;
}

// ============================================================
// DELETE ENTRY
// ============================================================
async function deleteEntry(id) {
  if (!confirm('Supprimer cette entrée ?')) return;
  const { error } = await supabaseClient.from('entries').delete().eq('id', id);
  if (!error) { await load(); await loadHistory(); }
}

// ============================================================
// HISTORY
// ============================================================
async function loadHistory() {
  const { data = [] } = await supabaseClient
    .from('entries').select('*').order('id', { ascending: false }).limit(10);
  
  // Dédupliquer par desc
  const seen = new Set();
  const unique = (data || []).filter(e => {
    if (seen.has(e.desc)) return false;
    seen.add(e.desc);
    return true;
  }).slice(0, 6);
  
  const emojis = {
    'Petit-déj':'🥐','Déjeuner':'🍽️','Dîner':'🌙',
    'Boissons':'🥤','Snack':'🍏','Autre':'➕','Sport':'🚴'
  };
  
  document.getElementById('history').innerHTML = unique.length 
    ? unique.map(e => `
        <button onclick="quickAdd('${e.desc.replace(/['"]/g,'_')}', ${e.val}, '${e.category}', '${e.type}')" 
          style="background:rgba(30,41,59,0.8);padding:0.375rem 0.75rem;border-radius:0.625rem;border:1px solid rgba(71,85,105,0.4);color:#e2e8f0;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;gap:0.375rem;transition:all 0.2s;max-width:140px;"
          onmouseover="this.style.transform='scale(1.05)'" 
          onmouseout="this.style.transform='scale(1)'">
          ${emojis[e.category]||'📝'} 
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.desc.length>12?e.desc.slice(0,12)+'…':e.desc}</span>
          <span style="font-weight:700;font-size:0.7rem;color:${e.type==='burn'?'#34d399':'#f87171'};margin-left:auto;padding-left:4px;">${e.val}</span>
        </button>`)
      .join('')
    : '<span style="color:#475569;font-size:0.8rem;padding:0.5rem;">Tes ajouts récents apparaîtront ici</span>';
}

// ============================================================
// QUICK ADD
// ============================================================
async function quickAdd(desc, val, cat, type) {
  const { error } = await supabaseClient.from('entries').insert([{
    category: cat,
    desc:     desc,
    val:      val,
    type:     type || "food",
    date:     new Date().toISOString().split('T')[0]
  }]);
  if (!error) { await load(); await loadHistory(); }
}

// ============================================================
// LOGOUT
// ============================================================
function logout() {
  supabaseClient.auth.signOut().then(() => location.reload());
}

// ============================================================
// START
// ============================================================
init();
</script>
