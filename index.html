<script>

// ✅ FIX DATE
function todayStr() {
    return new Date().toISOString().split('T')[0];
}

// ✅ LOAD DATA (corrigé)
async function loadData() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;

    const { data, error } = await sb
        .from('entries')
        .select('*')
        .eq('user_id', user.id)
        .eq('date', todayStr())
        .order('created_at', { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    currentEntries = data || [];

    let tIn = 0;
    currentEntries.forEach(e => {
        if (e.type === 'food') tIn += e.val;
    });

    const remaining = userGoal - tIn;

    document.getElementById('kcal-left').textContent = remaining;
    document.getElementById('stat-in').textContent = tIn;

    renderEntries();
}

// ✅ RENDER séparé (plus propre)
function renderEntries() {
    const listEl = document.getElementById('daily-list');

    const ORDER = ['Petit-déjeuner', 'Déjeuner', 'Dîner', 'Snack', 'Boissons', 'Sport'];
    const ICONS = {
        'Petit-déjeuner': '🥐',
        'Déjeuner': '🍽️',
        'Dîner': '🌙',
        'Snack': '🍎',
        'Boissons': '🥤',
        'Sport': '🔥'
    };

    const groups = {};
    ORDER.forEach(cat => groups[cat] = []);

    currentEntries.forEach(e => {
        if (groups[e.category]) groups[e.category].push(e);
    });

    let html = '';

    ORDER.forEach(cat => {
        const items = groups[cat];
        const subtotal = items.reduce((sum, e) => sum + e.val, 0);

        html += `
            <div class="entry-group">
                <div class="entry-group-header">
                    <div class="entry-group-left">
                        <span>${ICONS[cat]}</span>
                        <span class="entry-group-title">${cat}</span>
                    </div>
                    <div class="entry-group-actions">
                        <button class="entry-add-btn" onclick="openModal()">+ Ajouter</button>
                        <span class="entry-group-total">+${subtotal}</span>
                    </div>
                </div>
                <div class="entry-group-items">
                    ${items.length ? items.map(e => `
                        <div class="entry-item">
                            <span class="entry-desc">${e.desc}</span>
                            <div class="entry-right">
                                <span class="entry-kcal">+${e.val}</span>
                                <button onclick="editEntry('${e.id}')">✎</button>
                                <button onclick="deleteEntry('${e.id}')">✕</button>
                            </div>
                        </div>
                    `).join('') : '<div style="color: var(--muted);">Aucune entrée</div>'}
                </div>
            </div>
        `;
    });

    listEl.innerHTML = html;
}

// ✅ SAVE ENTRY FIX (IMPORTANT)
async function saveEntry() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;

    const desc = document.getElementById('entry-desc').value.trim();
    const cat = document.getElementById('entry-cat').value;
    const qty = parseFloat(document.getElementById('entry-qty').value) || 0;
    const kcal = parseFloat(document.getElementById('entry-kcal').value) || 0;

    if (!desc || qty <= 0 || kcal <= 0) {
        alert('Remplis tous les champs');
        return;
    }

    const val = Math.round(kcal * (qty / 100));

    const payload = {
        user_id: user.id,
        type: cat === 'Sport' ? 'burn' : 'food',
        category: cat,
        desc: `${desc} (${qty}g)`,
        val,
        prot: 0,
        gluc: 0,
        lip: 0,
        date: todayStr()
    };

    let error;

    if (editingEntryId) {
        ({ error } = await sb.from('entries').update(payload).eq('id', editingEntryId));
    } else {
        ({ error } = await sb.from('entries').insert([payload]));
    }

    if (error) {
        alert('Erreur: ' + error.message);
        return;
    }

    closeModal();

    // 🔥 FIX PRINCIPAL
    await loadData();
}

// ✅ SETTINGS SYNC
async function loadSettings() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;

    const { data } = await sb
        .from('user_settings')
        .select('*')
        .eq('user_id', user.id)
        .single();

    if (data) {
        userGoal = data.goal || 2300;
        userWeight = data.weight || 75;
        userHeight = data.height || 175;
        userAge = data.age || 30;
        userSexe = data.sexe || 'H';
    }
}

// ✅ INIT amélioré
async function init() {
    const { data: { session } } = await sb.auth.getSession();

    if (!session) {
        document.getElementById('auth-screen').style.display = 'flex';
        return;
    }

    document.getElementById('auth-screen').style.display = 'none';

    await loadSettings();
    await loadData();
    await loadRecipes();
}

</script>
