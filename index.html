
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LeGrosBarbu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0f14;
            --surface: #161921;
            --surface2: #1e2330;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #f0f2f8;
            --muted: #7a8098;
            --accent: #5b7fff;
            --accent2: #7c5cfa;
            --orange: #ff7c4d;
            --green: #3dd68c;
            --danger: #ff6b6b;
        }
        html { background: var(--bg); }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
        }
        h1, h2, h3 { font-family: 'Syne', sans-serif; }
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(13,15,20,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; }
        .logo span { color: var(--accent); }
        .header-date { font-size: 11px; color: var(--muted); text-transform: capitalize; }
        .header-btns { display: flex; gap: 8px; }
        .btn-icon { font-size: 11px; font-weight: 500; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 6px 12px; border-radius: 100px; cursor: pointer; }
        .btn-icon:hover { color: var(--text); }
        main { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }
        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .tab-btn { border: 1px solid var(--border); background: var(--surface); color: var(--muted); padding: 12px 10px; border-radius: 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(91,127,255,0.18), rgba(124,92,250,0.12)); color: var(--text); border-color: rgba(91,127,255,0.25); }
        .page { display: none; }
        .page.active { display: block; }
        .kcal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 28px 20px; margin-bottom: 16px; text-align: center; }
        .kcal-number { font-family: 'Syne', sans-serif; font-size: 68px; font-weight: 800; letter-spacing: -4px; }
        .kcal-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; margin-top: 6px; }
        .section-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
        .helper-line { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
        #daily-list { display: flex; flex-direction: column; gap: 14px; }
        .entry-group { margin-bottom: 8px; }
        .entry-group-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .entry-group-left { display: flex; align-items: center; gap: 8px; }
        .entry-group-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
        .entry-group-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .entry-group-total { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--accent); }
        .entry-add-btn { border: 1px solid var(--border); background: var(--surface2); color: var(--text); border-radius: 999px; padding: 5px 10px; font-size: 10px; font-weight: 700; cursor: pointer; }
        .entry-group-items { display: flex; flex-direction: column; gap: 6px; }
        .entry-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
        .entry-desc { font-size: 12px; }
        .entry-right { display: flex; align-items: center; gap: 8px; }
        .entry-kcal { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--accent); }
        .entry-action { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; }
        .entry-action:hover { color: var(--text); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; z-index: 60; }
        .modal.open { display: flex; }
        .modal-sheet { background: var(--surface); border: 1px solid var(--border2); border-radius: 28px 28px 0 0; width: 100%; max-width: 480px; padding: 24px 20px 40px; max-height: 92dvh; overflow-y: auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 18px; }
        .modal-close { float: right; background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; margin-top: -10px; }
        .input-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
        .input-box label { display: block; font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
        .input-box input, .input-box select { width: 100%; background: none; border: none; outline: none; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
        .btn-primary { width: 100%; background: var(--accent); border: none; border-radius: 12px; padding: 16px; color: white; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; }
        .btn-primary:hover { background: var(--accent2); }
        #auth-screen { position: fixed; inset: 0; z-index: 100; background: var(--bg); display: none; align-items: center; justify-content: center; padding: 32px; }
        .auth-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 28px; padding: 40px 32px; width: 100%; max-width: 360px; }
        .auth-logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 4px; }
        .auth-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: var(--text); margin-bottom: 10px; }
        .recipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
        .recipe-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
        .recipe-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
        .recipe-items { font-size: 12px; color: var(--text); line-height: 1.5; margin-top: 10px; }
        .recipe-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .btn-recipe { border: 1px solid var(--border); background: var(--surface2); color: var(--text); border-radius: 10px; padding: 8px 10px; font-size: 11px; cursor: pointer; }
        .btn-recipe.primary { background: var(--accent); border-color: transparent; color: white; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
        .stat-box .label { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
        .stat-box .value { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body>

<header>
    <div>
        <div class="logo">Le<span>Gros</span>Barbu</div>
        <div class="header-date" id="header-date"></div>
    </div>
    <div class="header-btns">
        <button class="btn-icon" onclick="openSettings()">⚙️ Réglages</button>
        <button class="btn-icon" onclick="logout()">Déconnexion</button>
    </div>
</header>

<main>
    <div class="tabs">
        <button class="tab-btn active" id="tab-journal" onclick="showPage('journal')">Journal</button>
        <button class="tab-btn" id="tab-recipes" onclick="showPage('recipes')">Repas</button>
        <button class="tab-btn" id="tab-bilan" onclick="showPage('bilan')">Bilan</button>
    </div>

    <section class="page active" id="page-journal">
        <div class="kcal-card">
            <div class="kcal-number" id="kcal-left">—</div>
            <div class="kcal-label">kcal disponibles aujourd'hui</div>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="label">🍽️ Ingérées</div>
                <div class="value" id="stat-in">0</div>
            </div>
            <div class="stat-box">
                <div class="label">🔥 Dépensées</div>
                <div class="value" id="stat-out">—</div>
            </div>
        </div>
        <div class="section-label">📋 Journal du jour</div>
        <div class="helper-line">Clique sur "+ Ajouter" pour enregistrer un aliment.</div>
        <div id="daily-list"></div>
    </section>

    <section class="page" id="page-recipes">
        <div class="section-label">📚 Recettes sauvegardées</div>
        <button class="entry-add-btn" style="width: 100%; padding: 12px; margin-bottom: 16px;" onclick="openRecipeEditor()">+ Créer une recette</button>
        <div id="recipes-list"></div>
    </section>

    <section class="page" id="page-bilan">
        <div class="section-label">📊 Bilan</div>
        <div id="bilan-content">Aucun bilan disponible</div>
    </section>
</main>

<!-- MODAL ENTRY -->
<div id="modal-entry" class="modal">
    <div class="modal-sheet">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-title">+ Ajouter une entrée</div>
        <div class="input-box">
            <label>Catégorie</label>
            <select id="entry-cat">
                <option>Petit-déjeuner</option>
                <option>Déjeuner</option>
                <option>Dîner</option>
                <option>Snack</option>
                <option>Boissons</option>
                <option>Sport</option>
            </select>
        </div>
        <div class="input-box">
            <label>Description</label>
            <input id="entry-desc" type="text" placeholder="Ex: Poulet rôti">
        </div>
        <div class="input-box">
            <label>Quantité (g)</label>
            <input id="entry-qty" type="number" value="100">
        </div>
        <div class="input-box">
            <label>Kcal / 100</label>
            <input id="entry-kcal" type="number" value="0">
        </div>
        <button class="btn-primary" onclick="saveEntry()">✓ Valider</button>
        <button class="btn-primary" style="background: var(--surface2); color: var(--text);" onclick="closeModal()">Annuler</button>
    </div>
</div>

<!-- MODAL SETTINGS -->
<div id="modal-settings" class="modal">
    <div class="modal-sheet">
        <button class="modal-close" onclick="closeSettings()">✕</button>
        <div class="modal-title">⚙️ Réglages</div>
        <div class="input-box">
            <label>Objectif calorique (kcal/jour)</label>
            <input id="s-goal" type="number" value="2300" onchange="onSettingChange()">
        </div>
        <div class="input-box">
            <label>Poids (kg)</label>
            <input id="s-weight" type="number" value="75" onchange="onSettingChange()">
        </div>
        <div class="input-box">
            <label>Taille (cm)</label>
            <input id="s-height" type="number" value="175" onchange="onSettingChange()">
        </div>
        <div class="input-box">
            <label>Âge</label>
            <input id="s-age" type="number" value="30" onchange="onSettingChange()">
        </div>
        <div class="input-box">
            <label>Sexe</label>
            <select id="s-sexe" onchange="onSettingChange()">
                <option value="H">Homme</option>
                <option value="F">Femme</option>
            </select>
        </div>
        <button class="btn-primary" onclick="saveSettings()">✓ Enregistrer</button>
        <button class="btn-primary" style="background: var(--surface2); color: var(--text);" onclick="closeSettings()">Annuler</button>
    </div>
</div>

<!-- MODAL RECIPE EDITOR -->
<div id="modal-recipe" class="modal">
    <div class="modal-sheet">
        <button class="modal-close" onclick="closeRecipeEditor()">✕</button>
        <div class="modal-title">✨ Créer une recette</div>
        <div class="input-box">
            <label>Nom de la recette</label>
            <input id="recipe-name" type="text" placeholder="Ex: Déjeuner saumon">
        </div>
        <div class="input-box">
            <label>Ingrédient</label>
            <input id="recipe-ing" type="text" placeholder="Ex: Saumon">
        </div>
        <div class="input-box">
            <label>Quantité (g)</label>
            <input id="recipe-qty" type="number" value="100">
        </div>
        <div class="input-box">
            <label>Kcal / 100</label>
            <input id="recipe-ing-kcal" type="number" value="0">
        </div>
        <button class="btn-primary" onclick="addIngredientToRecipe()">+ Ajouter ingrédient</button>
        <div id="recipe-ing-list" style="margin-top: 12px;"></div>
        <button class="btn-primary" onclick="saveRecipe()">✓ Enregistrer recette</button>
        <button class="btn-primary" style="background: var(--surface2); color: var(--text);" onclick="closeRecipeEditor()">Annuler</button>
    </div>
</div>

<!-- AUTH -->
<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-logo">Le<span style="color: var(--accent);">Gros</span>Barbu</div>
        <div style="font-size: 13px; color: var(--muted); margin-bottom: 32px;">Suivi nutritionnel quotidien</div>
        <input id="auth-email" class="auth-input" type="email" placeholder="Email">
        <input id="auth-pass" class="auth-input" type="password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') handleAuth()">
        <button class="btn-primary" onclick="handleAuth()">Se connecter</button>
    </div>
</div>

<script>
const SUPABASE_URL = "https://zlbwoxsmmdytoucgyhmc.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsYndveHNtbWR5dG91Y2d5aG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Nzk4MzUsImV4cCI6MjA5MTI1NTgzNX0.W1qBpzhCjOjVHRdeDCmfk6LjljlJc33AygVWG4CzWQE";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userGoal = 2300, userWeight = 75, userHeight = 175, userAge = 30, userSexe = "H";
let currentEntries = [];
let currentPage = "journal";
let savedRecipes = [];
let recipeBuilder = [];
let editingEntryId = null;

function todayStr() { return new Date().toISOString().split('T')[0]; }
function calcBMR(w, h, a, s) { const base = 10 * w + 6.25 * h - 5 * a; return Math.round((s === 'H' ? base + 5 : base - 161) * 1.2); }

function showPage(page) {
    currentPage = page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.getElementById('tab-' + page).classList.add('active');
}

function openModal() { document.getElementById('modal-entry').classList.add('open'); }
function closeModal() { document.getElementById('modal-entry').classList.remove('open'); editingEntryId = null; }
function openSettings() {
    document.getElementById('s-goal').value = userGoal;
    document.getElementById('s-weight').value = userWeight;
    document.getElementById('s-height').value = userHeight;
    document.getElementById('s-age').value = userAge;
    document.getElementById('s-sexe').value = userSexe;
    document.getElementById('modal-settings').classList.add('open');
}
function closeSettings() { document.getElementById('modal-settings').classList.remove('open'); }
function openRecipeEditor() {
    recipeBuilder = [];
    document.getElementById('recipe-name').value = '';
    document.getElementById('recipe-ing').value = '';
    document.getElementById('recipe-qty').value = '100';
    document.getElementById('recipe-ing-kcal').value = '0';
    document.getElementById('recipe-ing-list').innerHTML = '';
    document.getElementById('modal-recipe').classList.add('open');
}
function closeRecipeEditor() { document.getElementById('modal-recipe').classList.remove('open'); }

function onSettingChange() { }

async function saveSettings() {
    userGoal = parseInt(document.getElementById('s-goal').value) || 2300;
    userWeight = parseFloat(document.getElementById('s-weight').value) || 75;
    userHeight = parseInt(document.getElementById('s-height').value) || 175;
    userAge = parseInt(document.getElementById('s-age').value) || 30;
    userSexe = document.getElementById('s-sexe').value;
    closeSettings();
    loadData();
}

async function saveEntry() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    
    const desc = document.getElementById('entry-desc').value.trim();
    const cat = document.getElementById('entry-cat').value;
    const qty = parseFloat(document.getElementById('entry-qty').value) || 0;
    const kcal = parseFloat(document.getElementById('entry-kcal').value) || 0;
    
    if (!desc || qty <= 0 || kcal <= 0) { alert('Remplis tous les champs'); return; }
    
    const val = Math.round(kcal * (qty / 100));
    const payload = { user_id: user.id, type: 'food', category: cat, desc: `${desc} (${qty}g)`, val, prot: 0, gluc: 0, lip: 0, date: todayStr() };
    
    if (editingEntryId) {
        await sb.from('entries').update(payload).eq('id', editingEntryId);
    } else {
        await sb.from('entries').insert([payload]);
    }
    
    closeModal();
    loadData();
}

function editEntry(id) {
    const entry = currentEntries.find(e => e.id === id);
    if (!entry) return;
    editingEntryId = id;
    const match = entry.desc.match(/^(.*)\s\((\d+)g\)$/);
    document.getElementById('entry-cat').value = entry.category;
    document.getElementById('entry-desc').value = match ? match[1] : entry.desc;
    document.getElementById('entry-qty').value = match ? match[2] : 100;
    document.getElementById('entry-kcal').value = Math.round(entry.val / ((match ? parseInt(match[2]) : 100) / 100));
    openModal();
}

async function deleteEntry(id) {
    if (confirm('Supprimer cette entrée ?')) {
        await sb.from('entries').delete().eq('id', id);
        loadData();
    }
}

function addIngredientToRecipe() {
    const ing = document.getElementById('recipe-ing').value.trim();
    const qty = parseInt(document.getElementById('recipe-qty').value) || 100;
    const kcal = parseInt(document.getElementById('recipe-ing-kcal').value) || 0;
    
    if (!ing || qty <= 0 || kcal <= 0) { alert('Remplis tous les champs'); return; }
    
    recipeBuilder.push({ desc: ing, qty, kcal });
    renderRecipeIngredients();
    document.getElementById('recipe-ing').value = '';
    document.getElementById('recipe-qty').value = '100';
    document.getElementById('recipe-ing-kcal').value = '0';
}

function renderRecipeIngredients() {
    const el = document.getElementById('recipe-ing-list');
    el.innerHTML = recipeBuilder.map((ing, i) => `
        <div style="background: var(--surface2); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
            <span>${ing.desc} (${ing.qty}g) - ${ing.kcal} kcal/100</span>
            <button class="btn-recipe" onclick="removeIngredient(${i})">Supprimer</button>
        </div>
    `).join('');
}

function removeIngredient(i) {
    recipeBuilder.splice(i, 1);
    renderRecipeIngredients();
}

async function saveRecipe() {
    const name = document.getElementById('recipe-name').value.trim();
    if (!name || !recipeBuilder.length) { alert('Ajoute un nom et des ingrédients'); return; }
    
    const recipe = { id: String(Date.now()), name, items: recipeBuilder };
    savedRecipes.unshift(recipe);
    localStorage.setItem('recipes', JSON.stringify(savedRecipes));
    closeRecipeEditor();
    renderRecipesPage();
}

async function deleteRecipe(id) {
    if (confirm('Supprimer cette recette ?')) {
        savedRecipes = savedRecipes.filter(r => r.id !== id);
        localStorage.setItem('recipes', JSON.stringify(savedRecipes));
        renderRecipesPage();
    }
}

function renderRecipesPage() {
    const el = document.getElementById('recipes-list');
    if (!savedRecipes.length) {
        el.innerHTML = '<div class="recipe-card"><div class="recipe-name">Aucune recette</div></div>';
        return;
    }
    
    el.innerHTML = savedRecipes.map(r => {
        const total = r.items.reduce((s, i) => s + Math.round(i.kcal * (i.qty / 100)), 0);
        return `
            <div class="recipe-card">
                <div class="recipe-name">${r.name}</div>
                <div class="recipe-meta">${r.items.length} ingrédient(s) • ${total} kcal</div>
                <div class="recipe-items">${r.items.map(i => `• ${i.desc} (${i.qty}g)`).join('<br>')}</div>
                <div class="recipe-actions">
                    <button class="btn-recipe" onclick="deleteRecipe('${r.id}')">Supprimer</button>
                </div>
            </div>
        `;
    }).join('');
}

async function loadData() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    
    const { data } = await sb.from('entries').select('*').eq('user_id', user.id).eq('date', todayStr()).order('id', { ascending: false });
    let tIn = 0;
    currentEntries = data || [];
    currentEntries.forEach(e => { if (e.type === 'food') tIn += e.val; });
    
    const bmr = calcBMR(userWeight, userHeight, userAge, userSexe);
    const remaining = userGoal - tIn;
    
    document.getElementById('kcal-left').textContent = remaining;
    document.getElementById('stat-in').textContent = tIn;
    document.getElementById('stat-out').textContent = bmr;
    
    const listEl = document.getElementById('daily-list');
    const ORDER = ['Petit-déjeuner', 'Déjeuner', 'Dîner', 'Snack', 'Boissons', 'Sport'];
    const ICONS = { 'Petit-déjeuner': '🥐', 'Déjeuner': '🍽️', 'Dîner': '🌙', 'Snack': '🍎', 'Boissons': '🥤', 'Sport': '🔥' };
    
    const groups = {};
    ORDER.forEach(cat => groups[cat] = []);
    currentEntries.forEach(e => { if (groups[e.category]) groups[e.category].push(e); });
    
    let html = '';
    ORDER.forEach(cat => {
        const items = groups[cat];
        const subtotal = items.reduce((sum, e) => sum + e.val, 0);
        html += `
            <div class="entry-group">
                <div class="entry-group-header">
                    <div class="entry-group-left"><span>${ICONS[cat]}</span><span class="entry-group-title">${cat}</span></div>
                    <div class="entry-group-actions">
                        <button class="entry-add-btn" onclick="openModal()">+ Ajouter</button>
                        <span class="entry-group-total">+${subtotal}</span>
                    </div>
                </div>
                <div class="entry-group-items">
                    ${items.length ? items.map(e => `
                        <div class="entry-item">
                            <span class="entry-desc">${e.desc}</span>
                            <div class="entry-right">
                                <span class="entry-kcal">+${e.val}</span>
                                <button class="entry-action" onclick="editEntry(${e.id})">✎</button>
                                <button class="entry-action" onclick="deleteEntry(${e.id})">✕</button>
                            </div>
                        </div>
                    `).join('') : '<div style="color: var(--muted); font-size: 12px;">Aucune entrée</div>'}
                </div>
            </div>
        `;
    });
    listEl.innerHTML = html;
}

async function handleAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (!error) init();
}

function logout() { sb.auth.signOut().then(() => location.reload()); }

async function init() {
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
        document.getElementById('auth-screen').style.display = 'flex';
    } else {
        document.getElementById('auth-screen').style.display = 'none';
        savedRecipes = JSON.parse(localStorage.getItem('recipes') || '[]');
        await loadData();
        renderRecipesPage();
    }
}

document.getElementById('modal-entry').addEventListener('click', e => { if (e.target.id === 'modal-entry') closeModal(); });
document.getElementById('modal-settings').addEventListener('click', e => { if (e.target.id === 'modal-settings') closeSettings(); });
document.getElementById('modal-recipe').addEventListener('click', e => { if (e.target.id === 'modal-recipe') closeRecipeEditor(); });

init();
</script>
</body>
</html>
