<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BioTrack Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Styles fusionnés de ton document original */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0f14; --surface: #161921; --surface2: #1e2330;
            --text: #f0f2f8; --muted: #7a8098; --accent: #5b7fff; --accent2: #7c5cfa;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        input { width: 100%; background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 12px; margin-bottom: 10px; font-size: 16px; }
        .btn-primary { width: 100%; background: var(--accent); border: none; border-radius: 12px; padding: 16px; color: white; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; }
        
        /* Layout */
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .kcal-card { background: var(--surface); border-radius: 28px; padding: 30px; text-align: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .kcal-number { font-family: 'Syne'; font-size: 50px; font-weight: 800; color: var(--accent); }

        /* Scanner */
        #interactive.viewport { width: 100%; height: 250px; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 15px; }
        #interactive.viewport video, canvas { width: 100%; height: 100%; object-fit: cover; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--surface); width: 100%; max-width: 400px; border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="auth-screen" style="display:flex; flex-direction: column; padding: 40px; justify-content: center; min-height: 100vh;">
    <h1 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 20px;">Bio<span style="color:var(--accent)">Track</span></h1>
    <p style="color:var(--muted); margin-bottom: 20px;">Connectez-vous pour synchroniser vos données</p>
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-pass" placeholder="Mot de passe">
    <button class="btn-primary" onclick="handleAuth('login')">Se connecter</button>
    <button class="btn-primary" style="background:transparent; color:var(--accent); margin-top:10px;" onclick="handleAuth('signup')">Créer un compte</button>
</div>

<div id="app" style="display:none;" class="container">
    <div class="kcal-card">
        <div class="kcal-number" id="kcal-left">0</div>
        <div style="font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px;">kcal consommées</div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
        <button class="btn-primary" onclick="openScanner()">📷 Scanner</button>
        <button class="btn-primary" style="background: var(--surface2)" onclick="openManual()">✍️ Manuel</button>
    </div>
    <button class="btn-primary" style="background: var(--accent2)" onclick="openFavs()">⭐ Mes Favoris Cloud</button>

    <h3 style="margin: 25px 0 15px; font-family: 'Syne';">Journal du jour</h3>
    <div id="daily-list"></div>
    <button onclick="logout()" style="background:none; border:none; color:var(--muted); width:100%; margin-top:40px; cursor:pointer;">Se déconnecter</button>
</div>

<div id="modal-food" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-bottom:15px;">Ajouter</h3>
        <div id="scanner-container" style="display:none;"><div id="interactive" class="viewport"></div></div>
        
        <input type="text" id="f-desc" placeholder="Nom">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="number" id="f-kcal" placeholder="Kcal/100g">
            <input type="number" id="f-qty" value="100" placeholder="Quantité (g)">
        </div>
        
        <div style="display: flex; gap: 10px; margin-top:15px;">
            <button class="btn-primary" onclick="saveEntry()">Valider</button>
            <button class="btn-primary" style="background: #ff7c4d; width: 60px;" onclick="saveFav()">⭐</button>
        </div>
        <button class="btn-primary" style="background:transparent; color:var(--muted)" onclick="closeModal()">Annuler</button>
    </div>
</div>

<div id="modal-favs" class="modal">
    <div class="modal-content">
        <h3>Favoris Cloud</h3>
        <div id="favs-list" style="margin: 15px 0; max-height: 300px; overflow-y: auto;"></div>
        <button class="btn-primary" onclick="closeModal()">Fermer</button>
    </div>
</div>

<script>
    // --- TES CLÉS ---
    const SUPABASE_URL = "https://zlbwoxsmmdytoucgyhmc.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsYndveHNtbWR5dG91Y2d5aG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Nzk4MzUsImV4cCI6MjA5MTI1NTgzNX0.W1qBpzhCjOjVHRdeDCmfk6LjljlJc33AygVWG4CzWQE";
    
    // Initialisation robuste
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let user = null;

    // --- AUTH ---
    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pass').value;
        try {
            const { data, error } = (type === 'login') 
                ? await sb.auth.signInWithPassword({ email, password })
                : await sb.auth.signUp({ email, password });
            if (error) throw error;
            if (type === 'signup') alert("Compte créé !");
            init();
        } catch (e) { alert(e.message); }
    }

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            user = session.user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadData();
        }
    }

    // --- DATA ---
    async function loadData() {
        const today = new Date().toISOString().split('T')[0];
        const { data, error } = await sb.from('entries').select('*').eq('user_id', user.id).eq('date', today);
        if (error) { console.error(error); return; }

        const list = document.getElementById('daily-list');
        let total = 0;
        list.innerHTML = data.length ? "" : "<p style='color:var(--muted)'>Rien aujourd'hui</p>";
        
        data.forEach(e => {
            total += e.val;
            list.innerHTML += `<div style="background:var(--surface); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; border:1px solid rgba(255,255,255,0.05);">
                <span>${e.desc}</span><span style="font-weight:bold; color:var(--accent)">${e.val} kcal</span>
            </div>`;
        });
        document.getElementById('kcal-left').textContent = total;
    }

    async function saveEntry() {
        const factor = document.getElementById('f-qty').value / 100;
        const payload = {
            user_id: user.id,
            desc: document.getElementById('f-desc').value,
            val: Math.round(document.getElementById('f-kcal').value * factor),
            date: new Date().toISOString().split('T')[0]
        };
        const { error } = await sb.from('entries').insert([payload]);
        if (error) alert(error.message);
        else { closeModal(); loadData(); }
    }

    // --- FAVS ---
    async function saveFav() {
        await sb.from('favorites').insert([{
            user_id: user.id,
            name: document.getElementById('f-desc').value,
            kcal100: document.getElementById('f-kcal').value
        }]);
        alert("Sauvegardé !");
    }

    async function openFavs() {
        document.getElementById('modal-favs').classList.add('open');
        const { data } = await sb.from('favorites').select('*').eq('user_id', user.id);
        const list = document.getElementById('favs-list');
        list.innerHTML = "";
        data?.forEach(f => {
            const d = document.createElement('div');
            d.style.padding="10px"; d.style.background="var(--surface2)"; d.style.borderRadius="10px"; d.style.marginBottom="5px"; d.style.cursor="pointer";
            d.innerHTML = `<b>${f.name}</b> - ${f.kcal100} kcal`;
            d.onclick = () => {
                document.getElementById('f-desc').value = f.name;
                document.getElementById('f-kcal').value = f.kcal100;
                closeModal();
                document.getElementById('modal-food').classList.add('open');
            };
            list.appendChild(d);
        });
    }

    // --- SCAN ---
    function openScanner() {
        document.getElementById('scanner-container').style.display = 'block';
        document.getElementById('modal-food').classList.add('open');
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive') },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, (err) => { 
            if(err) { alert("Erreur caméra : Vérifiez les permissions HTTPS."); return; }
            Quagga.start(); 
        });

        Quagga.onDetected(async (res) => {
            Quagga.stop();
            document.getElementById('scanner-container').style.display = 'none';
            const code = res.codeResult.code;
            const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`).then(res => res.json());
            if(r.status === 1) {
                document.getElementById('f-desc').value = r.product.product_name;
                document.getElementById('f-kcal').value = r.product.nutriments['energy-kcal_100g'] || 0;
            }
        });
    }

    function openManual() {
        document.getElementById('scanner-container').style.display = 'none';
        document.getElementById('modal-food').classList.add('open');
    }

    function closeModal() {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
        if(typeof Quagga !== 'undefined') Quagga.stop();
    }

    function logout() { sb.auth.signOut().then(() => location.reload()); }

    init();
</script>
</body>
</html>
