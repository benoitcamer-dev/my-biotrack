<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioTrack Sync Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --accent2: #818cf8;
            --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; --success: #22c55e;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        
        input { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; margin: 8px 0; font-size: 16px; }
        .grid-macros { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .btn { cursor: pointer; border: none; padding: 14px; border-radius: 8px; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: 100%; }
        .btn-fav { background: #facc15; color: #000; width: 60px; font-size: 20px; }
        
        #interactive.viewport { width: 100%; height: 200px; overflow: hidden; border-radius: 12px; background: #000; position: relative; }
        #interactive.viewport video, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; position: relative; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--accent); margin: 0;">BioTrack</h1>
        <p style="color: var(--muted);">Synchronisation Cloud Active</p>
    </div>
    <input type="email" id="email" placeholder="Email (ex: benoit@mail.com)" autocomplete="email">
    <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="btn btn-primary" onclick="handleAuth('login')">SE CONNECTER</button>
    <button class="btn btn-outline" style="margin-top: 12px;" onclick="handleAuth('signup')">CRÉER UN COMPTE</button>
</div>

<div class="container" id="main-app" style="display: none;">
    <div class="card" style="text-align: center;">
        <h2 id="kcal-left" style="font-size: 2.5em; margin: 0; color: var(--accent);">2000</h2>
        <p style="color: var(--muted); margin: 5px 0;">Calories restantes</p>
        <button class="btn btn-outline" style="font-size: 10px; padding: 5px 15px; width: auto; margin-top: 10px;" onclick="logout()">Déconnexion</button>
    </div>

    <div class="card">
        <h3 style="margin-top: 0;">Ajouter un aliment</h3>
        <div class="grid-macros">
            <button class="btn btn-outline" onclick="openScanner()">📷 Scanner</button>
            <button class="btn btn-outline" onclick="openManualAdd()">✍️ Manuel</button>
        </div>
        <button class="btn btn-primary" style="margin-top: 12px;" onclick="openFavorites()">⭐ Mes Favoris Cloud</button>
    </div>

    <div id="daily-list"></div>
</div>

<div id="modal-scanner" class="modal"><div class="modal-content">
    <h3>Scanner un code-barres</h3>
    <div id="interactive" class="viewport"></div>
    <p id="scan-status" style="font-size: 12px; color: var(--muted); text-align: center;">Visez le code-barres...</p>
    <button class="btn btn-primary" onclick="closeScanner()" style="margin-top:10px;">Annuler</button>
</div></div>

<div id="modal-add" class="modal"><div class="modal-content">
    <h3 id="modal-title">Détails de l'aliment</h3>
    <input type="text" id="f-name" placeholder="Nom de l'aliment">
    <div class="grid-macros">
        <input type="number" id="f-kcal" placeholder="Kcal / 100g">
        <input type="number" id="f-prot" placeholder="Protéines">
        <input type="number" id="f-gluc" placeholder="Glucides">
        <input type="number" id="f-lip" placeholder="Lipides">
    </div>
    <hr style="border: 0.5px solid #334155; margin: 20px 0;">
    <label style="font-size: 12px; color: var(--muted);">Quantité consommée (en grammes)</label>
    <input type="number" id="f-qty" value="100">
    
    <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="btn btn-primary" style="flex:1" onclick="saveEntry()">AJOUTER AU JOURNAL</button>
        <button class="btn btn-fav" onclick="addToFavorites()">⭐</button>
    </div>
    <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeModal()">ANNULER</button>
</div></div>

<div id="modal-favs" class="modal"><div class="modal-content">
    <h3>⭐ Vos Favoris Cloud</h3>
    <div id="favs-list" style="display: flex; flex-direction: column; gap: 10px;">Chargement...</div>
    <button class="btn btn-primary" style="margin-top:15px;" onclick="closeModal()">FERMER</button>
</div></div>

<script>
    // --- 1. CONFIGURATION ---
    const SB_URL = "TA_URL_SUPABASE_ICI";
    const SB_KEY = "TA_CLE_ANON_ICI";
    
    // Initialisation sécurisée
    const supabase = supabasejs.createClient(SB_URL, SB_KEY);
    let currentUser = null;

    // --- 2. AUTHENTIFICATION ---
    async function handleAuth(type) {
        console.log("Tentative d'auth :", type);
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            alert("Veuillez remplir les deux champs.");
            return;
        }

        try {
            const { data, error } = (type === 'login') 
                ? await supabase.auth.signInWithPassword({ email, password })
                : await supabase.auth.signUp({ email, password });

            if (error) throw error;
            
            console.log("Auth réussie :", data);
            if (type === 'signup') alert("Compte créé !");
            checkUser();
        } catch (err) {
            console.error("Erreur Auth:", err);
            alert("Erreur : " + err.message);
        }
    }

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            console.log("Utilisateur connecté :", user.email);
            currentUser = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadData();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    }

    async function logout() { 
        await supabase.auth.signOut(); 
        location.reload(); 
    }

    // --- 3. GESTION DU JOURNAL (TABLE 'ENTRIES') ---
    async function loadData() {
        const today = new Date().toISOString().split('T')[0];
        const { data, error } = await supabase
            .from('entries')
            .select('*')
            .eq('user_id', currentUser.id)
            .eq('date', today);
        
        if (error) {
            console.error("Erreur chargement entries:", error);
            return;
        }

        const total = data.reduce((sum, e) => sum + (parseInt(e.val) || 0), 0);
        document.getElementById('kcal-left').innerText = 2000 - total;
        
        const list = document.getElementById('daily-list');
        list.innerHTML = `<h3 style="margin-top:20px;">Journal du jour</h3>`;
        
        if (data.length === 0) list.innerHTML += `<p style="color:var(--muted)">Aucun aliment ajouté.</p>`;

        data.forEach(e => {
            list.innerHTML += `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px; margin-bottom:10px;">
                    <div>
                        <strong>${e.desc}</strong><br>
                        <small style="color:var(--muted)">P:${e.prot}g | G:${e.gluc}g | L:${e.lip}g</small>
                    </div>
                    <span style="font-weight:bold; color:var(--accent)">${e.val} kcal</span>
                </div>`;
        });
    }

    async function saveEntry() {
        const qtyFactor = parseFloat(document.getElementById('f-qty').value) / 100;
        
        const payload = {
            user_id: currentUser.id,
            desc: document.getElementById('f-name').value,
            val: Math.round(parseFloat(document.getElementById('f-kcal').value) * qtyFactor),
            prot: Math.round(parseFloat(document.getElementById('f-prot').value) * qtyFactor),
            gluc: Math.round(parseFloat(document.getElementById('f-gluc').value) * qtyFactor),
            lip: Math.round(parseFloat(document.getElementById('f-lip').value) * qtyFactor),
            type: 'food',
            date: new Date().toISOString().split('T')[0]
        };

        const { error } = await supabase.from('entries').insert([payload]);
        if (error) alert("Erreur lors de l'ajout : " + error.message);
        else { 
            closeModal(); 
            loadData(); 
        }
    }

    // --- 4. GESTION DES FAVORIS (TABLE 'FAVORITES') ---
    async function addToFavorites() {
        const payload = {
            user_id: currentUser.id,
            name: document.getElementById('f-name').value,
            kcal100: parseInt(document.getElementById('f-kcal').value),
            prot100: parseFloat(document.getElementById('f-prot').value) || 0,
            gluc100: parseFloat(document.getElementById('f-gluc').value) || 0,
            lip100: parseFloat(document.getElementById('f-lip').value) || 0
        };
        const { error } = await supabase.from('favorites').insert([payload]);
        if (error) alert("Erreur favoris : " + error.message);
        else alert("Enregistré dans vos favoris !");
    }

    async function openFavorites() {
        document.getElementById('modal-favs').classList.add('open');
        const { data, error } = await supabase.from('favorites').select('*').eq('user_id', currentUser.id);
        
        const box = document.getElementById('favs-list');
        box.innerHTML = (data && data.length > 0) ? "" : "Aucun favori enregistré.";
        
        if (data) {
            data.forEach(f => {
                const div = document.createElement('div');
                div.className = "card";
                div.style.cssText = "cursor:pointer; margin-bottom:5px; padding:12px; background:#2d3a4f; border:none;";
                div.innerHTML = `<strong>${f.name}</strong><br><small style="color:var(--accent)">${f.kcal100} kcal/100g</small>`;
                div.onclick = () => {
                    document.getElementById('f-name').value = f.name;
                    document.getElementById('f-kcal').value = f.kcal100;
                    document.getElementById('f-prot').value = f.prot100;
                    document.getElementById('f-gluc').value = f.gluc100;
                    document.getElementById('f-lip').value = f.lip100;
                    closeModal();
                    document.getElementById('modal-add').classList.add('open');
                };
                box.appendChild(div);
            });
        }
    }

    // --- 5. SCANNER & INTERFACE ---
    function openScanner() {
        document.getElementById('modal-scanner').classList.add('open');
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive') },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, (err) => { 
            if(err) { console.error(err); alert("Erreur caméra : Vérifiez HTTPS et les permissions."); return; }
            Quagga.start(); 
        });
        
        Quagga.onDetected(async (res) => {
            Quagga.stop();
            const code = res.codeResult.code;
            document.getElementById('scan-status').innerText = "Code détecté : " + code + ". Recherche...";
            
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                const data = await response.json();
                if(data.status === 1) {
                    const p = data.product;
                    document.getElementById('f-name').value = p.product_name || "Produit Inconnu";
                    document.getElementById('f-kcal').value = p.nutriments['energy-kcal_100g'] || 0;
                    document.getElementById('f-prot').value = p.nutriments.proteins_100g || 0;
                    document.getElementById('f-gluc').value = p.nutriments.carbohydrates_100g || 0;
                    document.getElementById('f-lip').value = p.nutriments.fat_100g || 0;
                    closeScanner();
                    document.getElementById('modal-add').classList.add('open');
                } else {
                    alert("Produit inconnu dans OpenFoodFacts.");
                    closeScanner();
                }
            } catch (e) { alert("Erreur lors de la récupération des données."); }
        });
    }

    function openManualAdd() {
        document.getElementById('f-name').value = "";
        document.getElementById('f-kcal').value = "";
        document.getElementById('f-prot').value = "";
        document.getElementById('f-gluc').value = "";
        document.getElementById('f-lip').value = "";
        document.getElementById('modal-add').classList.add('open');
    }

    function closeScanner() { if(Quagga) Quagga.stop(); closeModal(); }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }

    // Démarrage automatique : vérifie si déjà connecté
    checkUser();
</script>
</body>
</html>
