<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BioTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0f14;
            --surface: #161921;
            --surface2: #1e2330;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #f0f2f8;
            --muted: #7a8098;
            --accent: #5b7fff;
            --accent2: #7c5cfa;
            --orange: #ff7c4d;
            --green: #3dd68c;
            --radius: 20px;
            --radius-sm: 12px;
        }
        html { background: var(--bg); }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            padding-bottom: 32px;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, .mono { font-family: 'Syne', sans-serif; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        /* Header */
        header {
            position: sticky; top: 0; z-index: 50;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px;
            background: rgba(13,15,20,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .header-date { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: capitalize; }
        .btn-logout {
            font-size: 11px; font-weight: 500; color: var(--muted);
            background: var(--surface); border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 100px; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-logout:hover { color: var(--text); border-color: var(--border2); }

        /* Main */
        main { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

        /* Kcal Card */
        .kcal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px 24px 28px;
            text-align: center;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .kcal-card::before {
            content: '';
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(91,127,255,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .kcal-number {
            font-family: 'Syne', sans-serif;
            font-size: 72px; font-weight: 800;
            letter-spacing: -4px; line-height: 1;
            background: linear-gradient(135deg, #fff 30%, #7a8098);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .kcal-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; margin-top: 8px; }
        .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 24px; }
        .macro-pill {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 8px;
        }
        .macro-pill .label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .macro-pill .val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
        .macro-pill.prot .label { color: var(--accent); }
        .macro-pill.gluc .label { color: var(--orange); }
        .macro-pill.lip .label { color: #fa5ccd; }

        /* Progress bar */
        .progress-wrap { margin-top: 20px; }
        .progress-bar-bg { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.5s ease; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 6px; }

        /* Category Grid */
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
        .cat-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 8px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
        }
        .cat-btn:hover, .cat-btn:active { border-color: var(--border2); background: var(--surface2); transform: scale(0.97); }
        .cat-icon { font-size: 22px; }
        .cat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
        .cat-btn.sport { background: linear-gradient(135deg, #ff7c4d22, #ff4d7c11); border-color: rgba(255,124,77,0.25); }
        .cat-btn.sport .cat-label { color: var(--orange); }

        /* Daily List */
        #daily-list { display: flex; flex-direction: column; gap: 8px; }
        .entry-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .entry-cat { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
        .entry-desc { font-size: 13px; font-weight: 400; color: var(--text); }
        .entry-right { display: flex; align-items: center; gap: 12px; }
        .entry-kcal { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
        .entry-kcal.food { color: var(--accent); }
        .entry-kcal.burn { color: var(--orange); }
        .entry-del { background: none; border: none; color: var(--border2); font-size: 14px; cursor: pointer; padding: 4px; transition: color 0.15s; }
        .entry-del:hover { color: #ff4d4d; }

        .section-title { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }

        /* Modal */
        #modal-add {
            position: fixed; inset: 0; z-index: 60;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none; align-items: flex-end; justify-content: center;
        }
        #modal-add.open { display: flex; }
        .modal-sheet {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 28px 28px 0 0;
            width: 100%; max-width: 480px;
            padding: 24px 20px 40px;
            max-height: 90dvh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 20px; }

        /* Search */
        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .search-input {
            flex: 1; background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 16px;
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
            color: var(--text); outline: none; transition: border-color 0.2s;
        }
        .search-input::placeholder { color: var(--muted); }
        .search-input:focus { border-color: var(--accent); }
        .search-btn {
            background: var(--accent); color: white;
            border: none; border-radius: var(--radius-sm);
            padding: 12px 16px; cursor: pointer; font-size: 16px;
            transition: all 0.15s; flex-shrink: 0;
        }
        .search-btn:hover { background: var(--accent2); }
        .search-btn:active { transform: scale(0.95); }

        #search-results {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 220px; overflow-y: auto;
            margin-bottom: 16px; display: none;
        }
        .result-item {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.15s;
        }
        .result-item:last-child { border-bottom: none; }
        .result-item:hover { background: rgba(91,127,255,0.08); }
        .result-name { font-size: 13px; font-weight: 500; }
        .result-kcal { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        .result-kcal.burn { color: var(--orange); }
        .result-tag { display: inline-block; font-size: 9px; padding: 2px 6px; background: rgba(91,127,255,0.15); color: var(--accent); border-radius: 4px; margin-bottom: 2px; }

        /* Inputs Grid */
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .input-box {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px 14px;
        }
        .input-box label { display: block; font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
        .input-box input {
            width: 100%; background: none; border: none; outline: none;
            font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
            color: var(--text);
        }
        .input-box input::placeholder { color: var(--border2); }
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

        .macros-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
        .macro-input {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 10px 12px; text-align: center;
        }
        .macro-input label { display: block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .macro-input input { width: 100%; background: none; border: none; outline: none; text-align: center; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
        .macro-input.prot label { color: var(--accent); }
        .macro-input.gluc label { color: var(--orange); }
        .macro-input.lip label { color: #fa5ccd; }

        /* Calc result */
        .calc-result {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px; text-align: center;
            margin-bottom: 16px;
        }
        .calc-result .big { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--text); }
        .calc-result .sub { font-size: 10px; color: var(--muted); font-weight: 500; margin-top: 2px; text-transform: uppercase; letter-spacing: 2px; }

        /* Buttons */
        .btn-primary {
            width: 100%; background: var(--accent);
            border: none; border-radius: var(--radius-sm);
            padding: 16px; color: white;
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-primary:hover { background: var(--accent2); }
        .btn-primary:active { transform: scale(0.98); }
        .btn-cancel {
            width: 100%; background: none; border: none;
            padding: 12px; color: var(--muted);
            font-size: 11px; font-weight: 500; cursor: pointer;
            transition: color 0.15s; margin-top: 8px;
        }
        .btn-cancel:hover { color: var(--text); }

        /* Auth */
        #auth-screen {
            position: fixed; inset: 0; z-index: 100;
            background: var(--bg);
            display: none; align-items: center; justify-content: center; padding: 32px;
        }
        .auth-card {
            background: var(--surface); border: 1px solid var(--border2);
            border-radius: 28px; padding: 40px 32px; width: 100%; max-width: 360px;
        }
        .auth-logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
        .auth-logo span { color: var(--accent); }
        .auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
        .auth-input {
            width: 100%; background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 14px 16px;
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            color: var(--text); outline: none; margin-bottom: 10px;
            transition: border-color 0.2s;
        }
        .auth-input:focus { border-color: var(--accent); }
        .auth-input::placeholder { color: var(--muted); }
        .auth-error { font-size: 12px; color: #ff6b6b; margin-bottom: 10px; display: none; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
        .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
    </style>
</head>

    <div class="section-title" id="list-title" style="display:none">Aujourd'hui</div>

</main>

<!-- Modal -->
<div id="modal-add">

        <div class="modal-handle"></div>
        <div class="modal-title" id="modal-title">Ajouter</div>

        <div class="search-row">
            <input id="in-desc" class="search-input" type="text" placeholder="Rechercher un aliment..." autocomplete="off"
                onkeydown="if(event.key==='Enter') startSearch()">
            <button class="search-btn" onclick="startSearch()">↵</button>
        </div>

        <div id="search-results"></div>

        <div class="inputs-grid">
            <div class="input-box">
                <label id="label-qty">Quantité (g)</label>
                <input id="in-qty" type="number" value="100" oninput="recalc()">
            </div>
            <div class="input-box">
                <label id="label-kcal">Kcal / 100g</label>
                <input id="in-kcal" type="number" placeholder="0" oninput="recalc()">
            </div>
        </div>

        <div class="macros-row" id="macro-fields">
            <div class="macro-input prot">
                <label>Prot.</label>
                <input id="in-p" type="number" value="0" placeholder="0" oninput="recalc()">
            </div>
            <div class="macro-input gluc">
                <label>Gluc.</label>
                <input id="in-g" type="number" value="0" placeholder="0" oninput="recalc()">
            </div>
            <div class="macro-input lip">
                <label>Lip.</label>
                <input id="in-l" type="number" value="0" placeholder="0" oninput="recalc()">
            </div>
        </div>

        <div class="calc-result">
            <div class="big" id="calc-res">0 kcal</div>
            <div class="sub" id="calc-sub">pour 100g</div>
        </div>

        <button class="btn-primary" onclick="submitEntry()">Valider</button>
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    </div>
</div>

        <button class="btn-primary" onclick="handleAuth()" style="margin-top:8px">Se connecter</button>

</div>

// ── Init ──
async function init() {
    document.getElementById('header-date').textContent =
        new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
        document.getElementById('auth-screen').style.display = 'flex';
    } else {
        document.getElementById('auth-screen').style.display = 'none';
        loadData();
    }
}

// ── Auth ──
async function handleAuth() {
    const email = document.getElementById('auth-email').value;
    const pass  = document.getElementById('auth-pass').value;
    const errEl = document.getElementById('auth-error');
    errEl.style.display = 'none';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { errEl.style.display = 'block'; }
    else { init(); }
}

function logout() { sb.auth.signOut().then(() => location.reload()); }

function openModal(cat) {
    currentCat = cat;
    document.getElementById('modal-title').textContent = cat === 'Sport' ? '🔥 Sport' : '+ ' + cat;
    document.getElementById('in-desc').value = '';
    document.getElementById('in-kcal').value = '';
    document.getElementById('in-p').value = '0';
    document.getElementById('in-g').value = '0';
    document.getElementById('in-l').value = '0';
    document.getElementById('in-qty').value = cat === 'Sport' ? '30' : '100';
    document.getElementById('calc-res').textContent = '0 kcal';
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('search-results').innerHTML = '';

    const isSport = cat === 'Sport';
    document.getElementById('label-qty').textContent  = isSport ? 'Durée (min)' : 'Quantité (g)';
    document.getElementById('label-kcal').textContent = isSport ? 'Kcal / heure' : 'Kcal / 100g';
    document.getElementById('calc-sub').textContent   = isSport ? 'dépensées' : 'pour cette portion';
    document.getElementById('macro-fields').style.display = isSport ? 'none' : 'grid';

    document.getElementById('in-desc').placeholder = isSport ? 'Rechercher un sport...' : 'Rechercher un aliment...';
    document.getElementById('modal-add').classList.add('open');
    setTimeout(() => document.getElementById('in-desc').focus(), 200);
}

function closeModal() {
    document.getElementById('modal-add').classList.remove('open');
}

// Fermer en cliquant le fond
document.getElementById('modal-add').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ── Recherche ──
function startSearch() {
    const val = document.getElementById('in-desc').value.trim();
    if (val.length < 1) return;
    if (currentCat === 'Sport') searchSport(val);
    else searchFood(val);
}

async function searchFood(val) {
    const resDiv = document.getElementById('search-results');
    resDiv.style.display = 'block';
    resDiv.innerHTML = `<div class="result-item"><div class="result-name" style="color:var(--muted)">Recherche en cours...</div></div>`;

    // 1. Base locale alcool (prioritaire, toujours visible en premier)
    const lowerVal = val.toLowerCase();
    const localHits = ALCOHOL_DB.filter(a => a.name.toLowerCase().includes(lowerVal));

    let localHTML = localHits.map(a => `
        <div class="result-item" onclick="fill('${esc(a.name)}', ${a.k}, ${a.pr}, ${a.gl}, ${a.lp})">
            <div><span class="result-tag">Base locale</span></div>
            <div class="result-name">${a.name}</div>
            <div class="result-kcal">${a.k} kcal / 100ml</div>
        </div>`).join('');

    // 2. Open Food Facts
    try {
        const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(val)}&json=1&page_size=20&action=process&sort_by=unique_scans_n`;
        const res  = await fetch(url);
        const data = await res.json();

        let offHTML = '';
        if (data.products && data.products.length > 0) {
            offHTML = data.products.map(p => {
                const name = (p.product_name_fr || p.product_name || '').trim();
                if (!name) return '';
                const nameEsc = esc(name);
                let k = Math.round(
                    p.nutriments?.['energy-kcal_100g'] ||
                    (p.nutriments?.['energy-kj_100g'] / 4.184) || 0
                );
                const pr = p.nutriments?.proteins_100g || 0;
                const gl = p.nutriments?.carbohydrates_100g || 0;
                const lp = p.nutriments?.fat_100g || 0;

                return `<div class="result-item" onclick="fill('${nameEsc}', ${k}, ${pr}, ${gl}, ${lp})">
                    <div class="result-name">${name}</div>
                    <div class="result-kcal">${k} kcal / 100g</div>
                </div>`;
            }).join('');
        }

        resDiv.innerHTML = localHTML + offHTML ||
            `<div class="result-item"><div class="result-name" style="color:var(--muted)">Aucun résultat — saisie manuelle possible</div></div>`;

    } catch {
        resDiv.innerHTML = localHTML ||
            `<div class="result-item"><div class="result-name" style="color:var(--muted)">Erreur réseau</div></div>`;
    }
}

function searchSport(val) {
    const resDiv = document.getElementById('search-results');
    resDiv.style.display = 'block';
    const lowerVal = val.toLowerCase();
    const hits = SPORT_DB.filter(s => s.name.toLowerCase().includes(lowerVal));
    resDiv.innerHTML = hits.map(s => `
        <div class="result-item" onclick="fill('${esc(s.name)}', ${s.k}, 0, 0, 0)">
            <div class="result-name">${s.name}</div>
            <div class="result-kcal burn">${s.k} kcal / heure</div>
        </div>`).join('') ||
        `<div class="result-item"><div class="result-name" style="color:var(--muted)">Saisie libre possible</div></div>`;
}

function esc(str) { return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function fill(name, k, pr, gl, lp) {
    document.getElementById('in-desc').value  = name;
    document.getElementById('in-kcal').value  = k;
    document.getElementById('in-p').value     = pr;
    document.getElementById('in-g').value     = gl;
    document.getElementById('in-l').value     = lp;
    document.getElementById('search-results').style.display = 'none';
    recalc();
}

function recalc() {
    const q      = parseFloat(document.getElementById('in-qty').value)  || 0;
    const k      = parseFloat(document.getElementById('in-kcal').value) || 0;
    const factor = currentCat === 'Sport' ? q / 60 : q / 100;
    document.getElementById('calc-res').textContent = Math.round(k * factor) + ' kcal';
    document.getElementById('calc-sub').textContent =
        currentCat === 'Sport' ? `pour ${q} min` : `pour ${q}g`;
}

// ── Submit ──
async function submitEntry() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;

    const desc = document.getElementById('in-desc').value.trim();
    const q    = parseFloat(document.getElementById('in-qty').value)  || 0;
    const k    = parseFloat(document.getElementById('in-kcal').value) || 0;
    if (!desc) { document.getElementById('in-desc').focus(); return; }

    const isSport = currentCat === 'Sport';
    const factor  = isSport ? q / 60 : q / 100;
    const val     = Math.round(k * factor);
    const p       = parseFloat(document.getElementById('in-p').value) || 0;
    const g       = parseFloat(document.getElementById('in-g').value) || 0;
    const l       = parseFloat(document.getElementById('in-l').value) || 0;

    await sb.from('entries').insert([{
        user_id:  user.id,
        type:     isSport ? 'burn' : 'food',
        category: currentCat,
        desc:     `${desc} (${q}${isSport ? 'min' : 'g'})`,
        val,
        prot:     Math.round(p * factor * 10) / 10,
        gluc:     Math.round(g * factor * 10) / 10,
        lip:      Math.round(l * factor * 10) / 10,
        date:     new Date().toISOString().split('T')[0]
    }]);

    closeModal();
    loadData();
}

// ── Load ──
async function loadData() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const today = new Date().toISOString().split('T')[0];
    const { data } = await sb.from('entries').select('*').eq('user_id', user.id).eq('date', today);

    let tIn = 0, tOut = 0, tP = 0, tG = 0, tL = 0;
    const entries = (data || []).sort((a, b) => b.id - a.id);

    entries.forEach(e => {
        if (e.type === 'food') {
            tIn += e.val;
            tP  += e.prot || 0;
            tG  += e.gluc || 0;
            tL  += e.lip  || 0;
        } else {
            tOut += e.val;
        }
    });

    const remaining = (GOAL + tOut) - tIn;
    document.getElementById('kcal-left').textContent  = remaining;
    document.getElementById('total-p').textContent    = Math.round(tP) + 'g';
    document.getElementById('total-g').textContent    = Math.round(tG) + 'g';
    document.getElementById('total-l').textContent    = Math.round(tL) + 'g';

    const pct = Math.min(100, Math.round((tIn / GOAL) * 100));
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-eaten').textContent = tIn + ' mangé';
    document.getElementById('progress-goal').textContent  = GOAL + ' objectif';

    const listEl    = document.getElementById('daily-list');
    const titleEl   = document.getElementById('list-title');

    if (entries.length === 0) {
        titleEl.style.display = 'none';
        listEl.innerHTML = `<div class="empty-state"><div class="icon">🥗</div>Aucun aliment enregistré aujourd'hui</div>`;
        return;
    }

    titleEl.style.display = 'block';
    listEl.innerHTML = entries.map(e => `
        <div class="entry-item">
            <div>
                <div class="entry-cat">${e.category}</div>
                <div class="entry-desc">${e.desc}</div>
            </div>
            <div class="entry-right">
                <span class="entry-kcal ${e.type}">${e.type === 'burn' ? '−' : '+'}${e.val} kcal</span>
                <button class="entry-del" onclick="del(${e.id})">✕</button>
            </div>
        </div>`).join('');
}

async function del(id) {
    await sb.from('entries').delete().eq('id', id);
    loadData();
}

init();
</script>
