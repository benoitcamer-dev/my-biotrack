<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BioTrack Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Styles conservés de ton document d'origine */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0f14; --surface: #161921; --surface2: #1e2330; --surface3: #252c3c;
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
            --text: #f0f2f8; --muted: #7a8098; --accent: #5b7fff; --accent2: #7c5cfa;
            --orange: #ff7c4d; --green: #3dd68c; --pink: #fa5ccd; --danger: #ff6b6b;
            --radius: 20px; --radius-sm: 12px;
        }
        html { background: var(--bg); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: 32px; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .mono { font-family: 'Syne', sans-serif; }
        header { position: sticky; top: 0; z-index: 50; display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(13,15,20,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .btn-icon { font-size: 11px; font-weight: 500; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 6px 12px; border-radius: 100px; cursor: pointer; }
        main { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
        .tab-btn { border: 1px solid var(--border); background: var(--surface); color: var(--muted); padding: 12px 10px; border-radius: 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .tab-btn.active { background: linear-gradient(135deg, rgba(91,127,255,0.18), rgba(124,92,250,0.12)); color: var(--text); }
        
        /* Nouveau : Style du scanner */
        #interactive { width: 100%; height: 200px; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: none; background: #000; position: relative; }
        #interactive video { width: 100%; height: 100%; object-fit: cover; }
        .scan-btn { background: var(--surface3); border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; cursor: pointer; font-weight: bold; font-size: 14px; }

        /* Modale d'ajout (adaptée de ton docx) */
        #modal-add { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; z-index: 60; }
        #modal-add.open { display: flex; }
        .modal-sheet { background: var(--surface); border-radius: 28px 28px 0 0; width: 100%; max-width: 480px; padding: 24px 20px 40px; max-height: 90dvh; overflow-y: auto; }
        .input-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
        .input-box label { font-size: 9px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .input-box input { width: 100%; background: none; border: none; color: var(--text); font-size: 18px; font-weight: 700; outline: none; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-primary { width: 100%; background: var(--accent); border: none; border-radius: 12px; padding: 16px; color: white; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="logo">Bio<span>Track</span></div>
            <div class="header-date" id="header-date"></div>
        </div>
        <button class="btn-icon" onclick="logout()">Déconnexion</button>
    </header>

    <main>
        <div class="tabs">
            <button class="tab-btn active" onclick="showPage('journal')">Journal</button>
            <button class="tab-btn" onclick="showPage('recipes')">Favoris</button>
            <button class="tab-btn" onclick="showPage('bilan')">Bilan</button>
        </div>

        <section class="page active" id="page-journal">
            <div id="daily-list"></div>
            <button class="btn-primary" onclick="openAddModal('Petit Déjeuner')">+ Ajouter un repas</button>
        </section>
        
        <section class="page" id="page-recipes">
            <div id="favorites-list"></div>
        </section>
    </main>

    <div id="modal-add">
        <div class="modal-sheet">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="modal-title">Ajouter</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:var(--muted); font-size:24px;">×</button>
            </div>

            <button class="scan-btn" onclick="startScan()">📷 Scanner un code-barre</button>
            <div id="interactive"></div>

            <div class="input-box">
                <label>Nom de l'aliment</label>
                <input id="in-desc" type="text" placeholder="Ex: Pomme">
            </div>

            <div class="inputs-grid">
                <div class="input-box">
                    <label>Quantité (g/ml)</label>
                    <input id="in-qty" type="number" value="100">
                </div>
                <div class="input-box">
                    <label>Kcal / 100g</label>
                    <input id="in-kcal" type="number" placeholder="0">
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn-primary" onclick="submitEntry()">Valider l'ajout</button>
                <button class="btn-icon" onclick="saveAsFavorite()" style="height:54px; margin-top:10px; background:var(--surface3); border-color:var(--accent);">⭐️</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION SUPABASE (Intégrée depuis ton document) ---
        const SB_URL = "https://zlbwoxsmmdytoucgyhmc.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsYndveHNtbWR5dG91Y2d5aG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Nzk4MzUsImV4cCI6MjA5MTI1NTgzNX0.W1qBpzhCjOjVHRdeDCmfk6LjljlJc33AygVWG4CzWQE"; 
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let currentMeal = "";

        // --- INITIALISATION ---
        async function checkUser() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                // Ici tu peux ajouter ton écran de login si besoin
                console.log("Utilisateur non connecté");
            } else {
                init();
            }
        }

        function init() {
            document.getElementById('header-date').textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
            loadData();
        }

        // --- NAVIGATION ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- MODALE ---
        function openAddModal(meal) {
            currentMeal = meal;
            document.getElementById('modal-title').textContent = meal;
            document.getElementById('modal-add').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal-add').classList.remove('open');
            if(typeof Quagga !== 'undefined') Quagga.stop();
            document.getElementById('interactive').style.display = 'none';
        }

        // --- SCANNER (Open Food Facts) ---
        function startScan() {
            const container = document.getElementById('interactive');
            container.style.display = 'block';
            
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: container, constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "ean_8_reader"] }
            }, (err) => {
                if (err) return alert("Erreur caméra : " + err);
                Quagga.start();
            });

            Quagga.onDetected(async (result) => {
                Quagga.stop();
                container.style.display = 'none';
                const code = result.codeResult.code;
                
                // Appel à l'API OpenFoodFacts
                const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`).then(r => r.json());
                if(res.status === 1) {
                    document.getElementById('in-desc').value = res.product.product_name || "Produit scanné";
                    document.getElementById('in-kcal').value = res.product.nutriments['energy-kcal_100g'] || 0;
                    alert("Produit détecté : " + res.product.product_name);
                } else {
                    alert("Produit non trouvé dans la base OpenFoodFacts.");
                }
            });
        }

        // --- FAVORIS ---
        async function saveAsFavorite() {
            const name = document.getElementById('in-desc').value;
            const kcal = document.getElementById('in-kcal').value;
            if(!name || !kcal) return alert("Veuillez remplir le nom et les kcal/100g");

            const { data: { user } } = await sb.auth.getUser();
            const { error } = await sb.from('favorites').insert([{
                user_id: user.id,
                name: name,
                kcal100: parseInt(kcal)
            }]);

            if (error) alert("Erreur favoris : " + error.message);
            else alert("Ajouté aux favoris ! ⭐️");
        }

        // --- ENREGISTRER UNE ENTRÉE (Journal) ---
        async function submitEntry() {
            const desc = document.getElementById('in-desc').value;
            const qty = document.getElementById('in-qty').value;
            const kcal100 = document.getElementById('in-kcal').value;
            const total = Math.round((qty * kcal100) / 100);

            const { data: { user } } = await sb.auth.getUser();
            const { error } = await sb.from('entries').insert([{
                user_id: user.id,
                date: new Date().toISOString().split('T')[0],
                meal: currentMeal,
                description: desc,
                amount: parseInt(qty),
                kcal_total: total
            }]);

            if(error) alert("Erreur : " + error.message);
            else {
                closeModal();
                loadData();
                alert("Ajouté au journal !");
            }
        }

        function loadData() {
            console.log("Chargement des données...");
            // Tu peux ici réutiliser tes fonctions d'affichage de liste du docx
        }

        function logout() {
            sb.auth.signOut().then(() => location.reload());
        }

        checkUser();
    </script>
</body>
</html>
