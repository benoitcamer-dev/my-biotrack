<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack Sync Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --accent2: #818cf8;
            --text: #f8fafc; --muted: #94a3b8; --danger: #ef4444; --success: #22c55e;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        
        input, select { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; margin: 8px 0; }
        .grid-macros { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .btn { cursor: pointer; border: none; padding: 12px; border-radius: 8px; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: 100%; }
        .btn-fav { background: #facc15; color: #000; width: 50px; font-size: 20px; }
        
        #interactive.viewport { width: 100%; height: 200px; overflow: hidden; border-radius: 12px; background: #000; }
        #interactive.viewport video, canvas { width: 100%; height: 100%; object-fit: cover; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2 style="text-align: center;">🚀 NutriTrack Sync</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">
    <button class="btn btn-primary" onclick="handleAuth('login')">Se connecter</button>
    <button class="btn btn-outline" style="margin-top: 10px;" onclick="handleAuth('signup')">S'inscrire (Nouveau compte)</button>
</div>

<div class="container" id="main-app" style="display: none;">
    <div class="card" style="text-align: center;">
        <h2 id="kcal-left" style="font-size: 2.5em; margin: 0;">2000</h2>
        <p style="color: var(--muted); margin: 5px 0;">Calories restantes</p>
        <button class="btn btn-outline" style="font-size: 11px; padding: 5px; width: auto;" onclick="logout()">Déconnexion</button>
    </div>

    <div class="card">
        <h3>Ajouter un aliment</h3>
        <div class="grid-macros">
            <button class="btn btn-outline" onclick="openScanner()">📷 Scan QR/Code</button>
            <button class="btn btn-outline" onclick="openManualAdd()">✍️ Manuel</button>
        </div>
        <button class="btn btn-primary" style="margin-top: 10px;" onclick="openFavorites()">⭐ Mes Favoris Cloud</button>
    </div>

    <div id="daily-list"></div>
</div>

<div id="modal-scanner" class="modal"><div class="modal-content">
    <h3>Scanner un produit</h3>
    <div id="interactive" class="viewport"></div>
    <button class="btn btn-primary" onclick="closeScanner()" style="margin-top:10px;">Annuler</button>
</div></div>

<div id="modal-add" class="modal"><div class="modal-content">
    <h3 id="modal-title">Détails de l'aliment</h3>
    <input type="text" id="f-name" placeholder="Nom de l'aliment">
    <div class="grid-macros">
        <input type="number" id="f-kcal" placeholder="Kcal / 100g">
        <input type="number" id="f-prot" placeholder="Prot (g)">
        <input type="number" id="f-gluc" placeholder="Gluc (g)">
        <input type="number" id="f-lip" placeholder="Lip (g)">
    </div>
    <hr style="border: 0.5px solid #334155; margin: 15px 0;">
    <label style="font-size: 12px; color: var(--muted);">Quantité consommée (g)</label>
    <input type="number" id="f-qty" value="100">
    
    <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="btn btn-primary" style="flex:1" onclick="saveEntry()">Ajouter au journal</button>
        <button class="btn btn-fav" onclick="addToFavorites()" title="Mettre en favori">⭐</button>
    </div>
    <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeModal()">Annuler</button>
</div></div>

<div id="modal-favs" class="modal"><div class="modal-content">
    <h3>⭐ Mes Favoris Cloud</h3>
    <div id="favs-list" style="display: flex; flex-direction: column; gap: 10px;">Chargement...</div>
    <button class="btn btn-primary" style="margin-top:15px;" onclick="closeModal()">Fermer</button>
</div></div>

<script>
    // CONFIGURATION SUPABASE
    const SB_URL = "VOTRE_URL_ICI";
    const SB_KEY = "VOTRE_CLE_ANON_ICI";
    const supabase = supabasejs.createClient(SB_URL, SB_KEY);

    let currentUser = null;

    // AUTHENTIFICATION
    async function handleAuth(type) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = (type === 'login') 
            ? await supabase.auth.signInWithPassword({ email, password })
            : await supabase.auth.signUp({ email, password });

        if (error) alert("Erreur d'authentification : " + error.message);
        else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            currentUser = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            loadData();
        }
    }

    async function logout() { await supabase.auth.signOut(); location.reload(); }

    // CHARGEMENT DU JOURNAL (Lecture colonnes 'desc' et 'val')
    async function loadData() {
        const today = new Date().toISOString().split('T')[0];
        const { data, error } = await supabase
            .from('entries')
            .select('*')
            .eq('user_id', currentUser.id)
            .eq('date', today);
        
        if (data) {
            const total = data.reduce((sum, e) => sum + (parseInt(e.val) || 0), 0);
            document.getElementById('kcal-left').innerText = 2000 - total;
            
            const list = document.getElementById('daily-list');
            list.innerHTML = "<h3>Journal du jour</h3>";
            data.forEach(e => {
                list.innerHTML += `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px; margin-bottom:10px;">
                        <div>
                            <strong>${e.desc}</strong><br>
                            <small style="color:var(--muted)">P:${e.prot} G:${e.gluc} L:${e.lip}</small>
                        </div>
                        <span style="font-weight:bold; color:var(--accent)">${e.val} kcal</span>
                    </div>`;
            });
        }
    }

    // SAUVEGARDE DANS LE JOURNAL (Ecriture colonnes 'desc' et 'val')
    async function saveEntry() {
        const qtyFactor = parseFloat(document.getElementById('f-qty').value) / 100;
        
        const payload = {
            user_id: currentUser.id,
            desc: document.getElementById('f-name').value,
            val: Math.round(parseFloat(document.getElementById('f-kcal').value) * qtyFactor),
            prot: Math.round(parseFloat(document.getElementById('f-prot').value) * qtyFactor * 10) / 10,
            gluc: Math.round(parseFloat(document.getElementById('f-gluc').value) * qtyFactor * 10) / 10,
            lip: Math.round(parseFloat(document.getElementById('f-lip').value) * qtyFactor * 10) / 10,
            type: 'food',
            date: new Date().toISOString().split('T')[0]
        };

        const { error } = await supabase.from('entries').insert([payload]);
        if (error) alert("Erreur Supabase: " + error.message);
        else { closeModal(); loadData(); }
    }

    // GESTION DES FAVORIS
    async function addToFavorites() {
        const payload = {
            user_id: currentUser.id,
            name: document.getElementById('f-name').value,
            kcal100: parseInt(document.getElementById('f-kcal').value),
            prot100: parseFloat(document.getElementById('f-prot').value),
            gluc100: parseFloat(document.getElementById('f-gluc').value),
            lip100: parseFloat(document.getElementById('f-lip').value)
        };
        const { error } = await supabase.from('favorites').insert([payload]);
        if (error) alert(error.message);
        else alert("Ajouté aux favoris Cloud !");
    }

    async function openFavorites() {
        document.getElementById('modal-favs').classList.add('open');
        const { data } = await supabase.from('favorites').select('*').eq('user_id', currentUser.id);
        const box = document.getElementById('favs-list');
        box.innerHTML = data?.length ? "" : "Aucun favori enregistré.";
        data?.forEach(f => {
            const div = document.createElement('div');
            div.className = "card";
            div.style.cssText = "cursor:pointer; margin-bottom:5px; padding:10px; background:#2d3a4f";
            div.innerHTML = `<strong>${f.name}</strong><br><small>${f.kcal100} kcal/100g</small>`;
            div.onclick = () => {
                document.getElementById('f-name').value = f.name;
                document.getElementById('f-kcal').value = f.kcal100;
                document.getElementById('f-prot').value = f.prot100;
                document.getElementById('f-gluc').value = f.gluc100;
                document.getElementById('f-lip').value = f.lip100;
                closeModal();
                document.getElementById('modal-add').classList.add('open');
            };
            box.appendChild(div);
        });
    }

    // SCANNER & UTILS
    function openScanner() {
        document.getElementById('modal-scanner').classList.add('open');
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive') },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, (err) => { if(!err) Quagga.start(); });
        
        Quagga.onDetected(async (res) => {
            Quagga.stop();
            const code = res.codeResult.code;
            const data = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`).then(r => r.json());
            if(data.status === 1) {
                const p = data.product;
                document.getElementById('f-name').value = p.product_name || "Produit inconnu";
                document.getElementById('f-kcal').value = p.nutriments['energy-kcal_100g'] || 0;
                document.getElementById('f-prot').value = p.nutriments.proteins_100g || 0;
                document.getElementById('f-gluc').value = p.nutriments.carbohydrates_100g || 0;
                document.getElementById('f-lip').value = p.nutriments.fat_100g || 0;
                closeScanner();
                document.getElementById('modal-add').classList.add('open');
            } else {
                alert("Produit non trouvé.");
                closeScanner();
            }
        });
    }

    function openManualAdd() {
        document.getElementById('f-name').value = "";
        document.getElementById('f-kcal').value = "";
        document.getElementById('modal-add').classList.add('open');
    }

    function closeScanner() { Quagga.stop(); closeModal(); }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }

    checkUser();
</script>
</body>
</html>
