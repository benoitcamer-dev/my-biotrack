<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioTrack Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

<meta name="theme-color" content="#2563eb">

<style>
body { font-family: sans-serif; background: #f8fafc; }
.glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
.no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>

<body class="pb-24">

<script>
const SUPABASE_URL = "TON_URL";
const SUPABASE_KEY = "TA_CLE";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ⚖️ poids utilisateur (modifiable)
let userWeight = 84;

// 🎯 objectif
let goal = 2300;

// 🏃 sports avec MET
const sportsDB = [
    { name: "Marche 5 km/h", met: 3.5 },
    { name: "Marche 6 km/h", met: 4.3 },
    { name: "Course 10 km/h", met: 10 },
    { name: "Vélo faible (appartement)", met: 4 },
    { name: "Vélo modéré (appartement)", met: 6 },
    { name: "Vélo intense (appartement)", met: 8 },
    { name: "Musculation", met: 5 },
    { name: "Natation", met: 8 }
];
</script>

<header class="sticky top-0 glass p-4 flex justify-between">
    <div>
        <h1 class="font-black text-blue-600">Biotrack</h1>
        <p id="header-date" class="text-xs text-slate-400"></p>
    </div>
    <button onclick="logout()">Sortir</button>
</header>

<main class="max-w-md mx-auto p-4">

<div class="bg-white p-6 rounded-3xl text-center mb-6">

    <div class="text-4xl font-black">
        <span id="kcal-left">0</span>
        <span class="text-sm">kcal</span>
    </div>

    <div class="text-xs mt-2">
        objectif :
        <input id="goal-input" type="number" value="2300" class="w-20 text-center">
    </div>

</div>

<div class="grid grid-cols-3 gap-2 mb-6">
<button onclick="openModal('Petit-déjeuner')">🥐</button>
<button onclick="openModal('Déjeuner')">🍽️</button>
<button onclick="openModal('Dîner')">🌙</button>
<button onclick="openModal('Boissons')">🥤</button>
<button onclick="openModal('Autre')">🍏</button>
<button onclick="openModal('Sport')">🚴</button>
</div>

<div id="daily-list"></div>

</main>

<!-- MODAL -->
<div id="modal-add" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">

<div class="bg-white p-6 rounded-2xl w-full max-w-sm">

<input id="in-desc" placeholder="Rechercher..." class="w-full p-3 border mb-2">
<button onclick="startSearch()">🔍</button>

<div id="search-results" class="max-h-40 overflow-y-auto"></div>

<input id="in-qty" type="number" value="100" class="w-full mt-2">
<input id="in-kcal" type="number" placeholder="kcal ou MET" class="w-full mt-2">

<div id="calc-res" class="text-center font-black text-xl mt-4">0 kcal</div>

<button onclick="submitEntry()" class="w-full bg-blue-600 text-white p-3 mt-4">Valider</button>
<button onclick="closeModal()" class="w-full mt-2">Annuler</button>

</div>
</div>

<script>

let currentCat = "";

function init() {
    document.getElementById('header-date').innerText = new Date().toLocaleDateString();
    loadData();
}

// 🔎 recherche intelligente
async function searchFood(val) {
    const resDiv = document.getElementById('search-results');
    if (val.length < 2) return;

    const urls = [
        `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(val)}&json=1&page_size=10`,
        `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(val)}&json=1&page_size=10&categories_tags=beverages`
    ];

    const results = await Promise.all(urls.map(u => fetch(u).then(r => r.json())));
    let products = [...results[0].products, ...results[1].products];

    products = products.sort((a,b)=>{
        const score = p => (!p.ingredients_text ? 2 : 0);
        return score(b)-score(a);
    });

    resDiv.innerHTML = products.slice(0,15).map(p=>{
        const name = (p.product_name_fr || p.product_name || "Inconnu");
        let kcal = p.nutriments?.['energy-kcal_100g'] || 0;

        const lower = name.toLowerCase();
        if(kcal===0){
            if(lower.includes('vin')) kcal = 80;
            if(lower.includes('biere')) kcal = 45;
        }

        return `<div onclick="fill('${name}', ${kcal})" class="p-2 border-b">${name} (${kcal} kcal)</div>`;
    }).join('');
}

// 🏃 sport
function searchSport(val){
    const resDiv = document.getElementById('search-results');

    const filtered = sportsDB.filter(s => s.name.toLowerCase().includes(val.toLowerCase()));

    resDiv.innerHTML = filtered.map(s=>`
        <div onclick="fill('${s.name}', ${s.met})" class="p-2 border-b">
        ${s.name}
        </div>
    `).join('');
}

function startSearch(){
    const val = document.getElementById('in-desc').value;
    if(currentCat==="Sport") searchSport(val);
    else searchFood(val);
}

function fill(name, kcal){
    document.getElementById('in-desc').value = name;
    document.getElementById('in-kcal').value = kcal;
    recalc();
}

// 🔥 calcul
function recalc(){
    const q = parseFloat(document.getElementById('in-qty').value)||0;
    const k = parseFloat(document.getElementById('in-kcal').value)||0;

    let total = 0;

    if(currentCat==="Sport"){
        total = k * userWeight * 0.0175 * q;
    }else{
        total = k * (q/100);
    }

    document.getElementById('calc-res').innerText = Math.round(total)+" kcal";
}

// 💾 save
async function submitEntry(){
    const q = parseFloat(document.getElementById('in-qty').value)||0;
    const k = parseFloat(document.getElementById('in-kcal').value)||0;
    const d = document.getElementById('in-desc').value;

    if(!d) return;

    let val = 0;

    if(currentCat==="Sport"){
        val = k * userWeight * 0.0175 * q;
    }else{
        val = k * (q/100);
    }

    await supabaseClient.from('entries').insert([{
        category: currentCat,
        desc: d,
        val: Math.round(val),
        type: currentCat==="Sport" ? "burn" : "food",
        date: new Date().toISOString().split('T')[0]
    }]);

    closeModal();
    loadData();
}

// 📊 affichage
async function loadData(){

    goal = parseInt(document.getElementById('goal-input').value)||2300;

    const { data } = await supabaseClient.from('entries').select('*');

    let tIn=0, tOut=0;

    const groups = {
        "Petit-déjeuner": [],
        "Déjeuner": [],
        "Dîner": [],
        "Boissons": [],
        "Autre": []
    };

    (data||[]).forEach(e=>{
        if(e.type==="food") tIn+=e.val;
        else tOut+=e.val;

        if(groups[e.category]) groups[e.category].push(e);
    });

    let html="";

    for(const cat in groups){
        if(groups[cat].length===0) continue;

        html+=`<div class="mb-4">
        <h3 class="font-bold">${cat}</h3>`;

        groups[cat].forEach(e=>{
            html+=`
            <div class="flex justify-between bg-white p-3 rounded mb-2">
            <span>${e.desc}</span>
            <span>${e.val} kcal</span>
            </div>`;
        });

        html+=`</div>`;
    }

    document.getElementById('daily-list').innerHTML = html;

    document.getElementById('kcal-left').innerText = (goal + tOut) - tIn;
}

// 🧹 reset
function closeModal(){
    document.getElementById('modal-add').classList.add('hidden');

    document.getElementById('in-desc').value="";
    document.getElementById('in-qty').value=100;
    document.getElementById('in-kcal').value="";
    document.getElementById('search-results').innerHTML="";
}

function openModal(cat){
    currentCat = cat;
    document.getElementById('modal-add').classList.remove('hidden');
}

function logout(){
    supabaseClient.auth.signOut().then(()=>location.reload());
}

init();
</script>

</body>
</html>
