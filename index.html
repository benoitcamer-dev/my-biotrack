<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioTrack Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { font-family: 'Inter', sans-serif; }
body { 
  background: #0a0a0a; 
  color: white;
  min-height: 100vh;
}
.glass { 
  background: rgba(20,20,20,0.9); 
  backdrop-filter: blur(20px); 
  border: 1px solid rgba(255,255,255,0.1);
}
.card { 
  @apply bg-slate-800/80 backdrop-blur-xl rounded-2xl p-4 shadow-lg hover:shadow-2xl hover:scale-[1.02] hover:bg-slate-700 transition-all duration-200 border border-slate-700/50 cursor-pointer;
  touch-action: manipulation;
}
.btn-primary { 
  @apply bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-semibold py-3 px-6 rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-200;
}
.btn-secondary { 
  @apply bg-slate-700/50 backdrop-blur-xl text-slate-200 font-medium py-2 px-4 rounded-xl hover:bg-slate-600 hover:text-white transition-all duration-200;
}
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.fade-in-up { animation: fadeInUp 0.5s ease-out; }
</style>
</head>

<body>
<script>
const SUPABASE_URL = "TON_URL";
const SUPABASE_KEY = "TA_CLE";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentCat = "", scanner = null, userWeight = 84;
const goalDefault = 2300;

const sportsDB = [
  { name:"Marche lente (4 km/h)", met:2.8 },
  { name:"Marche normale (5 km/h)", met:3.5 },
  { name:"Marche rapide (6 km/h)", met:4.3 },
  { name:"Course (10 km/h)", met:10 },
  { name:"Vélo léger", met:4 },
  { name:"Vélo modéré", met:6 },
  { name:"Vélo intense", met:8 },
  { name:"Musculation", met:5 },
  { name:"Natation", met:8 }
];
</script>

<header class="sticky top-0 glass p-6 flex justify-between items-center z-50 shadow-2xl">
  <div class="flex items-center gap-3">
    <div class="w-12 h-12 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-2xl">
      <span class="text-2xl">📊</span>
    </div>
    <div>
      <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">BioTrack</h1>
      <p id="date" class="text-sm text-slate-400 font-medium"></p>
    </div>
  </div>
  <button onclick="logout()" class="btn-secondary text-sm">Déconnexion</button>
</header>

<main class="max-w-sm mx-auto p-6">
  
  <!-- CARD PRINCIPALE -->
  <div class="glass rounded-3xl p-8 shadow-2xl text-center mb-8 fade-in-up">
    <div class="text-5xl font-black bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent mb-2" id="kcalLeft">0</div>
    <p class="text-sm font-semibold text-slate-400 uppercase tracking-wide">kcal restantes</p>
    
    <div class="mt-6 flex justify-center gap-6 items-center text-sm">
      <div class="text-slate-400">
        🎯 <input id="goalInput" value="2300" class="w-20 text-center bg-transparent border-b border-slate-500/50 focus:border-blue-400 outline-none font-bold text-xl text-white">
      </div>
      <div class="text-slate-400">
        ⚖️ <input id="weightInput" value="84" class="w-16 text-center bg-transparent border-b border-slate-500/50 focus:border-blue-400 outline-none font-bold text-xl text-white">
      </div>
    </div>
  </div>

  <!-- BOUTONS RAPIDES - 100% CLICKABLES -->
  <div class="grid grid-cols-3 gap-4 mb-8">
    <button onclick="openModal('Petit-déj')" class="card h-24 flex flex-col items-center justify-center gap-2 text-2xl font-bold active:scale-95" title="Petit-déj">
      🥐<span class="text-xs font-medium opacity-90">Petit-déj</span>
    </button>
    <button onclick="openModal('Déjeuner')" class="card h-24 flex flex-col items-center justify-center gap-2 text-2xl font-bold active:scale-95" title="Déjeuner">
      🍽️<span class="text-xs font-medium opacity-90">Déjeuner</span>
    </button>
    <button onclick="openModal('Dîner')" class="card h-24 flex flex-col items-center justify-center gap-2 text-2xl font-bold active:scale-95" title="Dîner">
      🌙<span class="text-xs font-medium opacity-90">Dîner</span>
    </button>
    <button onclick="openModal('Boissons')" class="card h-24 flex flex-col items-center justify-center gap-2 text-2xl font-bold active:scale-95" title="Boissons">
      🥤<span class="text-xs font-medium opacity-90">Boissons</span>
    </button>
    <button onclick="openModal('Autre')" class="card h-24 flex flex-col items-center justify-center gap-2 text-2xl font-bold active:scale-95" title="Autre">
      🍏<span class="text-xs font-medium opacity-90">Autre</span>
    </button>
    <button onclick="openModal('Sport')" class="card h-24 flex flex-col items-center justify-center gap-2 text-2xl font-bold bg-gradient-to-br from-orange-500 to-red-500 text-white shadow-orange-500/50 active:scale-95" title="Sport">
      🚴<span class="text-xs font-bold">SPORT</span>
    </button>
  </div>

  <!-- HISTORIQUE -->
  <div class="glass rounded-2xl p-5 mb-6 fade-in-up" style="animation-delay: 0.1s;">
    <p class="text-sm font-bold text-slate-300 mb-4 flex items-center gap-2">📜 Historique rapide</p>
    <div id="history" class="flex gap-2 flex-wrap" style="min-height: 44px;"></div>
  </div>

  <!-- LISTE DU JOUR -->
  <div id="dailyList" class="space-y-3"></div>

</main>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
  <div class="glass rounded-3xl p-6 w-full max-w-md max-h-[90vh] overflow-hidden fade-in-up">
    
    <div class="flex items-center justify-between mb-1">
      <h3 id="modalTitle" class="text-xl font-bold text-white"></h3>
      <button onclick="closeModal()" class="text-2xl text-slate-400 hover:text-white p-1 rounded-lg hover:bg-slate-700/50 transition-all">×</button>
    </div>

    <div class="flex gap-2 mb-4">
      <input id="desc" class="flex-1 p-4 bg-slate-800/50 rounded-2xl border border-slate-600 focus:border-blue-400 focus:outline-none transition-all text-white placeholder-slate-400" placeholder="Rechercher un aliment...">
      <button onclick="startSearch()" class="p-4 bg-slate-700 hover:bg-slate-600 rounded-2xl transition-all flex items-center justify-center" title="Rechercher">🔍</button>
      <button id="scanBtn" onclick="startScan()" class="p-4 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white rounded-2xl shadow-lg transition-all flex items-center justify-center" title="Scanner">📷</button>
    </div>

    <div id="results" class="max-h-48 overflow-y-auto bg-slate-800/50 rounded-2xl p-3 mb-4 space-y-1"></div>

    <div class="space-y-3">
      <input id="qty" value="100" class="w-full p-4 bg-slate-800/50 rounded-2xl border border-slate-600 focus:border-blue-400 focus:outline-none text-lg font-bold text-center text-white" placeholder="Quantité (g)">
      
      <div class="relative">
        <input id="kcal" class="w-full p-4 bg-slate-800/50 rounded-2xl border border-slate-600 focus:border-blue-400 focus:outline-none text-lg font-bold text-right pr-20 text-white" placeholder="kcal/100g ou MET">
        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">/100g</span>
      </div>

      <div id="calc" class="text-center font-black text-3xl bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent p-4 rounded-2xl bg-slate-800/30">0 kcal</div>
    </div>

    <div class="flex gap-3 mt-6 pt-6 border-t border-slate-700">
      <button onclick="save()" class="flex-1 btn-primary text-lg shadow-xl font-bold">✅ VALIDER</button>
      <button onclick="closeModal()" class="flex-1 btn-secondary text-lg font-medium">❌ Annuler</button>
    </div>

    <div id="reader" class="mt-4 rounded-2xl overflow-hidden hidden"></div>
  </div>
</div>

<script>
// Éléments DOM
const elements = {
  date: document.getElementById('date'),
  kcalLeft: document.getElementById('kcalLeft'),
  goalInput: document.getElementById('goalInput'),
  weightInput: document.getElementById('weightInput'),
  modal: document.getElementById('modal'),
  modalTitle: document.getElementById('modalTitle'),
  desc: document.getElementById('desc'),
  qty: document.getElementById('qty'),
  kcal: document.getElementById('kcal'),
  calc: document.getElementById('calc'),
  results: document.getElementById('results'),
  history: document.getElementById('history'),
  dailyList: document.getElementById('dailyList'),
  reader: document.getElementById('reader'),
  scanBtn: document.getElementById('scanBtn')
};

// INIT
async function init() {
  elements.date.textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  
  // Event listeners
  elements.goalInput.addEventListener('input', updateGoal);
  elements.weightInput.addEventListener('input', updateWeight);
  elements.qty.addEventListener('input', calc);
  elements.kcal.addEventListener('input', calc);
  
  await load();
  await loadHistory();
}

// UPDATE PARAMS
function updateGoal() { 
  localStorage.setItem('goal', elements.goalInput.value); 
  load(); 
}
function updateWeight() { 
  userWeight = parseFloat(elements.weightInput.value) || 84;
  localStorage.setItem('weight', userWeight.toString());
  calc();
}

// SEARCH FOOD
async function searchFood(query) {
  try {
    const urls = [
      `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&page_size=10`,
      `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&page_size=10&categories_tags=beverages`
    ];
    
    const [res1, res2] = await Promise.all(urls.map(url => fetch(url).then(r => r.json()).catch(()=>null)));
    let products = [...(res1?.products || []), ...(res2?.products || [])].slice(0, 15);

    elements.results.innerHTML = products.map(p => {
      const name = p.product_name_fr || p.product_name || "Inconnu";
      let kcal = p.nutriments?.['energy-kcal_100g'] || 0;
      
      if (kcal === 0) {
        if (name.toLowerCase().includes("vin")) kcal = 80;
        if (name.toLowerCase().includes("bière") || name.toLowerCase().includes("biere")) kcal = 45;
      }
      
      return `<div onclick="fill('${name.replace(/'/g, "\\'")}', ${kcal})" class="p-3 rounded-xl hover:bg-slate-700 cursor-pointer transition-all flex justify-between items-center group">
        <span class="group-hover:translate-x-1 transition-transform">${name}</span>
        <span class="font-bold text-sm opacity-90">${kcal ? Math.round(kcal) : '?'} kcal</span>
      </div>`;
    }).join('') || '<div class="p-4 text-center text-slate-500">Aucun résultat</div>';
  } catch(e) {
    elements.results.innerHTML = '<div class="p-4 text-center text-slate-500">Erreur réseau</div>';
  }
}

// SEARCH SPORT (inchangé)
function searchSport(query) {
  const results = sportsDB.filter(s => 
    s.name.toLowerCase().includes(query.toLowerCase()) ||
    query.toLowerCase().includes("vélo") || query.toLowerCase().includes("velo") ||
    query.toLowerCase().includes("marche")
  );
  
  elements.results.innerHTML = results.map(s => 
    `<div onclick="fill('${s.name.replace(/'/g, "\\'")}', ${s.met})" class="p-3 rounded-xl hover:bg-slate-700 cursor-pointer transition-all flex justify-between items-center group">
      <span class="group-hover:translate-x-1 transition-transform">${s.name}</span>
      <span class="font-bold text-sm opacity-90">${s.met} MET</span>
    </div>`
  ).join('') || '<div class="p-4 text-center text-slate-500">Aucun sport trouvé</div>';
}

function startSearch() {
  const query = elements.desc.value.trim();
  if (!query) return elements.results.innerHTML = '';
  
  if (currentCat === "Sport") searchSport(query);
  else searchFood(query);
}

// SCAN (simplifié sans librairie externe pour éviter les conflits)
function startScan() {
  alert('Scanner désactivé temporairement. Utilise la recherche manuelle 🔍');
  // À réactiver si besoin avec la librairie
}

// FILL
function fill(name, kcalValue) {
  elements.desc.value = name;
  elements.kcal.value = kcalValue;
  calc();
}

// CALC
function calc() {
  const qty = parseFloat(elements.qty.value) || 0;
  const kcalVal = parseFloat(elements.kcal.value) || 0;
  
  let total = currentCat === "Sport" 
    ? kcalVal * userWeight * 0.0175 * (qty / 60)
    : kcalVal * (qty / 100);
  
  elements.calc.textContent = Math.round(total) + " kcal";
}

// SAVE
async function save() {
  const qty = parseFloat(elements.qty.value) || 0;
  const kcalVal = parseFloat(elements.kcal.value) || 0;
  const descVal = elements.desc.value.trim();
  
  if (!descVal || qty <= 0) {
    alert('Remplis tous les champs !');
    return;
  }
  
  const val = currentCat === "Sport"
    ? Math.round(kcalVal * userWeight * 0.0175 * (qty / 60))
    : Math.round(kcalVal * (qty / 100));
  
  const { error } = await supabaseClient.from('entries').insert([{
    category: currentCat,
    desc: descVal,
    val: Math.max(1, val),
    type: currentCat === "Sport" ? "burn" : "food",
    date: new Date().toISOString().split('T')[0]
  }]);
  
  if (!error) {
    closeModal();
    await load();
    await loadHistory();
  } else {
    alert('Erreur sauvegarde');
  }
}

// LOAD (simplifié)
async function load() {
  const goal = parseInt(localStorage.getItem('goal') || elements.goalInput.value) || goalDefault;
  elements.goalInput.value = goal;
  
  const weight = parseFloat(localStorage.getItem('weight') || elements.weightInput.value) || 84;
  elements.weightInput.value = weight;
  userWeight = weight;
  
  const today = new Date().toISOString().split('T')[0];
  const { data = [] } = await supabaseClient.from('entries').select('*').eq('date', today);
  
  let totalIn = 0, totalOut = 0;
  const groups = {"Petit-déj":[], "Déjeuner":[], "Dîner":[], "Boissons":[], "Autre":[]};
  
  data.forEach(e => {
    if (e.type === "food") totalIn += e.val;
    else totalOut += e.val;
    if (groups[e.category] !== undefined) groups[e.category].push(e);
  });
  
  let html = '';
  for (let cat in groups) {
    if (groups[cat].length) {
      html += `<p class="text-sm font-bold text-slate-300 mt-6 mb-3 flex items-center gap-2">${getEmoji(cat)} ${cat}</p>`;
      groups[cat].forEach(e => {
        html += `<div class="glass p-4 rounded-2xl flex justify-between items-center hover:shadow-xl transition-all cursor-pointer" onclick="quickEdit(${e.id})">
          <span class="font-medium">${e.desc}</span>
          <div class="text-right">
            <span class="text-xl font-black ${e.type === 'burn' ? 'text-emerald-400' : 'text-red-400'}">${e.val}</span>
            <span class="text-xs text-slate-500 ml-1">${e.type === 'burn' ? 'brûlé' : 'mangé'}</span>
          </div>
        </div>`;
      });
    }
  }
  
  elements.dailyList.innerHTML = html || '<div class="text-center text-slate-500 py-12 text-lg">Aucune entrée aujourd’hui<br><span class="text-sm">Clique sur un bouton pour commencer !</span></div>';
  elements.kcalLeft.textContent = Math.max(0, goal + totalOut - totalIn);
}

function getEmoji(cat) {
  const emojis = {
    'Petit-déj': '🥐',
    'Déjeuner': '🍽️', 
    'Dîner': '🌙',
    'Boissons': '🥤',
    'Autre': '🍏',
    'Sport': '🚴'
  };
  return emojis[cat] || '📝';
}

// HISTORY
async function loadHistory() {
  const { data = [] } = await supabaseClient.from('entries').select('*').limit(8).order('id', { ascending: false });
  
  elements.history.innerHTML = data.map(e => 
    `<button onclick="quickAdd('${e.desc.replace(/'/g, "\\'")}', ${e.val}, '${e.category}')" 
      class="glass px-4 py-2 rounded-xl shadow-lg hover:shadow-xl hover:scale-105 transition-all text-sm flex items-center gap-2 truncate flex-1 min-w-[120px] max-w-[150px] active:scale-95">
      ${getEmoji(e.category)} ${e.desc.length > 12 ? e.desc.slice(0,12) + '...' : e.desc}
      <span class="font-bold ml-auto text-sm ${e.type==='burn'?'text-emerald-400':'text-red-400'}">${e.val}</span>
    </button>`
  ).join('');
}

// QUICK ADD
async function quickAdd(desc, val, cat = "Autre") {
  const { error } = await supabaseClient.from('entries').insert([{
    category: cat,
    desc,
    val,
    type: "food",
    date: new Date().toISOString().split('T')[0]
  }]);
  if (!error) {
    await load();
    await loadHistory();
  }
}

// UI
function openModal(cat) {
  currentCat = cat;
  elements.modalTitle.textContent = cat;
  elements.modal.classList.remove("hidden");
  elements.desc.focus();
  elements.desc.select();
}

function closeModal() {
  elements.modal.classList.add("hidden");
  resetModal();
}

function resetModal() {
  elements.desc.value = '';
  elements.qty.value = '100';
  elements.kcal.value = '';
  elements.results.innerHTML = '';
  elements.calc.textContent = '0 kcal';
}

function logout() {
  supabaseClient.auth.signOut().then(() => location.reload());
}

// START
init();
</script>

</body>
</html>
